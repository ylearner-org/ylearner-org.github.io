  window.QUIZ_DATA = {
    title: "SQL Filtering Quiz",
    questions: [
      { q: "Which operator checks if two values are equal in SQL?", options: ["==", "===", "=", "EQ"], answer: 2 },
      { q: "Which of these means \"not equal to\" in SQL?", options: ["!=", "<>", "Both != and <>", "NOT ="], answer: 2 },
      { q: "What does <code>salary > 50000 AND department = 'HR'</code> return?", options: ["Rows where either condition is true", "Rows where salary > 50000 OR department is HR", "Rows where BOTH conditions are true", "Rows where salary > 50000 but NOT in HR"], answer: 2 },
      { q: "What does <code>WHERE age < 25 OR age > 60</code> return?", options: ["Rows where age is between 25 and 60", "Rows where age is less than 25 AND greater than 60 simultaneously", "Rows where age is below 25 or above 60", "Rows where age equals 25 or 60"], answer: 2 },
      { q: "In SQL, what is the operator precedence order for AND and OR?", options: ["OR is evaluated before AND", "AND is evaluated before OR", "They have equal precedence", "Depends on the database"], answer: 1 },
      { q: "How do you correctly query rows where city is NOT London?", options: ["WHERE city = NOT 'London'", "WHERE NOT city 'London'", "WHERE city <> 'London'", "WHERE city != 'London' (both C and D work)"], answer: 3 },
      { q: "What does the <code>%</code> wildcard in LIKE match?", options: ["Exactly one character", "Zero or more characters", "Only letters", "A literal percent sign"], answer: 1 },
      { q: "What does the <code>_</code> wildcard in LIKE match?", options: ["Zero or more characters", "A literal underscore", "Exactly one character", "Any digit"], answer: 2 },
      { q: "Which query finds all names starting with \"J\"?", options: ["WHERE name LIKE 'J'", "WHERE name LIKE 'J%'", "WHERE name LIKE '%J'", "WHERE name STARTS WITH 'J'"], answer: 1 },
      { q: "Which query finds all 5-character product codes starting with \"A\"?", options: ["WHERE code LIKE 'A____'", "WHERE code LIKE 'A%____'", "WHERE code LIKE 'A%%%'", "WHERE code LIKE 'A????'"], answer: 0 },
      { q: "Is LIKE case-sensitive in SQL?", options: ["Always case-sensitive", "Always case-insensitive", "Depends on the database and collation settings", "Always case-sensitive in MySQL"], answer: 2 },
      { q: "What does <code>BETWEEN 10 AND 20</code> include?", options: ["Values strictly greater than 10 and less than 20", "Values from 10 to 20, INCLUSIVE of both endpoints", "Values from 11 to 19 only", "Values equal to 10 or 20 only"], answer: 1 },
      { q: "Which query returns rows where age is NOT between 18 and 65?", options: ["WHERE age NOT 18 AND 65", "WHERE age <> BETWEEN 18 AND 65", "WHERE age NOT BETWEEN 18 AND 65", "WHERE BETWEEN age NOT (18, 65)"], answer: 2 },
      { q: "What does <code>WHERE status IN ('active', 'pending')</code> do?", options: ["Returns rows where status equals 'active' OR 'pending'", "Returns rows where status equals 'active' AND 'pending'", "Returns rows where status does NOT match those values", "Returns rows where status starts with 'active'"], answer: 0 },
      { q: "What is the equivalent of <code>IN (1, 2, 3)</code> without using IN?", options: ["WHERE id = 1 AND id = 2 AND id = 3", "WHERE id = 1 OR id = 2 OR id = 3", "WHERE id BETWEEN 1 AND 3", "WHERE id >= 1 AND id <= 3"], answer: 1 },
      { q: "What is a dangerous trap with <code>NOT IN</code> when the list contains a NULL?", options: ["NOT IN with NULLs always returns all rows", "NOT IN with NULLs returns no rows because NULL comparisons are UNKNOWN", "NOT IN ignores NULL values silently", "NOT IN with NULL causes a syntax error"], answer: 1 },
      { q: "How do you check if a column value is NULL?", options: ["WHERE column = NULL", "WHERE column == NULL", "WHERE column IS NULL", "WHERE ISNULL(column)"], answer: 2 },
      { q: "Why does <code>WHERE column = NULL</code> not work?", options: ["NULL must use double equals", "NULL is a keyword not a value, = NULL always returns FALSE", "SQL uses == for NULL checks", "NULL comparison requires CAST"], answer: 1 },
      { q: "How do you find rows where a column is NOT null?", options: ["WHERE column != NULL", "WHERE column IS NOT NULL", "WHERE column <> NULL", "WHERE NOT NULL(column)"], answer: 1 },
      { q: "What does <code>WHERE name LIKE '%son%'</code> match?", options: ["Only names ending in 'son'", "Only names starting with 'son'", "Any name containing 'son' anywhere", "Names equal to 'son'"], answer: 2 },
      { q: "Which query uses logical NOT correctly?", options: ["WHERE salary NOT > 5000", "WHERE NOT salary > 5000", "WHERE salary <NOT> 5000", "WHERE EXCLUDE salary > 5000"], answer: 1 },
      { q: "What does <code>WHERE city NOT IN ('Paris', 'London')</code> return if city can be NULL?", options: ["Rows where city is anything except 'Paris' and 'London', including NULL", "Rows where city is not 'Paris' and not 'London' — NULL rows are NOT returned", "Rows where city is NULL only", "An error"], answer: 1 },
      { q: "Which operator is more efficient for range queries: BETWEEN or >= and <=?", options: ["BETWEEN is always faster", "They are equivalent; BETWEEN is just syntactic sugar for >= AND <=", ">= and <= is always faster", "Depends entirely on the database engine"], answer: 1 },
      { q: "What does <code>WHERE salary BETWEEN 3000 AND 5000</code> include?", options: ["salary > 3000 AND salary < 5000", "salary >= 3000 AND salary <= 5000", "salary > 3000 AND salary <= 5000", "salary >= 3000 AND salary < 5000"], answer: 1 },
      { q: "How do you search for a literal percent sign <code>%</code> using LIKE?", options: ["LIKE '\\%'", "LIKE '!%' ESCAPE '!'", "LIKE '{%}'", "You cannot search for a literal % with LIKE"], answer: 1 }
