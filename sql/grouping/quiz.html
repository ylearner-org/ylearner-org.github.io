  <script>
  window.QUIZ_DATA = {
    title: "SQL Grouping & Aggregation Quiz",
    questions: [
      { q: "What does <code>GROUP BY department</code> do?", options: ["Sorts rows by department", "Filters rows by department", "Groups rows with the same department value together for aggregation", "Removes duplicate departments"], answer: 2 },
      { q: "Which clause filters groups AFTER aggregation?", options: ["WHERE", "FILTER", "HAVING", "LIMIT"], answer: 2 },
      { q: "What is the key difference between WHERE and HAVING?", options: ["They are the same", "WHERE filters rows before grouping; HAVING filters groups after grouping", "WHERE is for strings; HAVING is for numbers", "HAVING comes before GROUP BY"], answer: 1 },
      { q: "Can you use aggregate functions in a WHERE clause?", options: ["Yes, always", "No — use HAVING for aggregate conditions", "Yes, but only with subqueries", "Only COUNT can be used in WHERE"], answer: 1 },
      { q: "Which query finds departments with more than 10 employees?", options: ["SELECT department FROM employees WHERE COUNT(*) > 10 GROUP BY department", "SELECT department, COUNT(*) FROM employees HAVING COUNT(*) > 10", "SELECT department, COUNT(*) FROM employees GROUP BY department HAVING COUNT(*) > 10", "SELECT department FROM employees HAVING employees > 10 GROUP BY department"], answer: 2 },
      { q: "Must every column in SELECT (that is not an aggregate) appear in GROUP BY?", options: ["No, it is optional", "Yes, in standard SQL all non-aggregate SELECT columns must be in GROUP BY", "Only in MySQL", "Only primary key columns must be in GROUP BY"], answer: 1 },
      { q: "What does <code>GROUP BY ROLLUP(a, b)</code> generate?", options: ["Only the total row", "Subtotals for each a, grand total", "Subtotals for each a, subtotals for each (a, b) combination, plus a grand total", "Only (a, b) combinations"], answer: 2 },
      { q: "What does CUBE produce compared to ROLLUP?", options: ["CUBE is identical to ROLLUP", "CUBE generates subtotals for ALL combinations of the specified columns (including individual columns and the grand total)", "CUBE generates fewer rows", "CUBE only works with two columns"], answer: 1 },
      { q: "What does <code>OVER()</code> indicate in a window function?", options: ["The end of a subquery", "That the function runs over all rows without collapsing them", "A foreign key reference", "A cursor declaration"], answer: 1 },
      { q: "What does <code>PARTITION BY</code> do in a window function?", options: ["Groups rows like GROUP BY but collapses them", "Divides rows into groups (partitions) within which the window function runs independently", "Filters rows before the window function", "Orders the result set"], answer: 1 },
      { q: "What does <code>ROW_NUMBER() OVER (ORDER BY salary DESC)</code> return?", options: ["A rank with gaps for ties", "The salary rank without gaps", "A sequential integer 1, 2, 3… assigned by salary descending (ties get different numbers)", "The count of rows"], answer: 2 },
      { q: "What is the difference between RANK() and DENSE_RANK()?", options: ["They are identical", "RANK() leaves gaps for ties (1,1,3); DENSE_RANK() does not (1,1,2)", "DENSE_RANK() leaves gaps; RANK() does not", "RANK() is always 1-based; DENSE_RANK() is 0-based"], answer: 1 },
      { q: "What does <code>LAG(salary, 1) OVER (ORDER BY hire_date)</code> return for each row?", options: ["The next row's salary", "The previous row's salary", "The salary 1 year ago", "The average of the previous salary"], answer: 1 },
      { q: "What does <code>LEAD(salary, 1) OVER (ORDER BY hire_date)</code> return?", options: ["The previous row's salary", "The next row's salary", "A running total", "The lead time for the salary"], answer: 1 },
      { q: "What does <code>SUM(salary) OVER (PARTITION BY department)</code> do?", options: ["Returns one row per department with total salary", "Returns each employee's salary with the department total as an additional column", "Groups employees by department and sums salary", "Replaces each salary with the department total"], answer: 1 },
      { q: "When is a window function calculated relative to WHERE and GROUP BY?", options: ["Before WHERE", "After WHERE and HAVING but before final SELECT output", "Before GROUP BY", "At the same time as WHERE"], answer: 1 },
      { q: "What does <code>NTILE(4) OVER (ORDER BY score)</code> do?", options: ["Divides rows into 4 equal buckets (quartiles) by score", "Returns the 4th row", "Rounds score to 4 decimal places", "Creates 4 separate result sets"], answer: 0 },
      { q: "What does <code>FIRST_VALUE(salary) OVER (PARTITION BY dept ORDER BY salary DESC)</code> return?", options: ["The lowest salary per department", "The highest salary per department (first after ORDER BY DESC)", "The first salary inserted", "The average salary"], answer: 1 },
      { q: "Can you use WHERE to filter window function results?", options: ["Yes, directly", "No — window functions execute after WHERE; use a subquery or CTE to filter on window function results", "Yes, with WINDOW clause", "Only in PostgreSQL"], answer: 1 },
      { q: "What does an empty OVER() clause — <code>OVER()</code> — mean?", options: ["Applies the function to each row individually", "Applies the function over the entire result set as a single partition", "Causes an error", "Applies function to the first row only"], answer: 1 },
      { q: "Which SQL feature returns a running total?", options: ["SUM(col) with GROUP BY", "SUM(col) OVER (ORDER BY date_col)", "ROLLUP(col)", "RUNNING_TOTAL(col)"], answer: 1 },
      { q: "What does GROUPING SETS do?", options: ["Groups by multiple columns simultaneously", "Allows specifying multiple GROUP BY groupings in one query", "Is a synonym for ROLLUP", "Generates subtotals for CUBE"], answer: 1 },
      { q: "What does <code>HAVING SUM(sales) > 10000</code> do in a GROUP BY query?", options: ["Filters individual rows where sales > 10000", "Keeps only groups whose total sales exceed 10000", "Returns the maximum sales per group", "Removes groups with NULL sales"], answer: 1 },
      { q: "Which function returns a percentage rank between 0 and 1?", options: ["RANK()", "DENSE_RANK()", "PERCENT_RANK()", "ROW_NUMBER()"], answer: 2 },
      { q: "What does <code>ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</code> define in a window function?", options: ["A fixed 3-row window", "All rows in the partition before the current row, plus the current row (cumulative/running)", "Only the current row", "The last 5 rows"], answer: 1 }
    ]
  };
  </script>
