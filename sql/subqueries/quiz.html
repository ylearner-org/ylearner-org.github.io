  <script>
  window.QUIZ_DATA = {
    title: "SQL Subqueries Quiz",
    questions: [
      { q: "What is a subquery?", options: ["A stored procedure", "A query nested inside another query", "A view definition", "A second database connection"], answer: 1 },
      { q: "Where can a subquery appear in a SQL statement?", options: ["Only in the WHERE clause", "Only in the FROM clause", "In SELECT, FROM, WHERE, HAVING, and other clauses", "Only in SELECT"], answer: 2 },
      { q: "What is a scalar subquery?", options: ["A subquery returning multiple rows and columns", "A subquery that returns exactly one row and one column (a single value)", "A subquery used in FROM clause", "A subquery with ORDER BY"], answer: 1 },
      { q: "What happens if a scalar subquery returns more than one row?", options: ["SQL returns the first row automatically", "SQL returns NULL", "SQL raises a runtime error", "SQL returns all rows"], answer: 2 },
      { q: "What is an inline view (derived table)?", options: ["A subquery used in the WHERE clause", "A subquery used in the FROM clause, treated as a temporary table", "A subquery inside another subquery", "A correlated subquery"], answer: 1 },
      { q: "What is a correlated subquery?", options: ["A subquery that does not use any tables", "A subquery that references a column from the outer query and re-executes for each row", "A subquery that returns a table", "A subquery with a JOIN"], answer: 1 },
      { q: "Why are correlated subqueries potentially slow?", options: ["They cannot use indexes", "They re-execute once for each row processed by the outer query", "They are not supported in all databases", "They block concurrent queries"], answer: 1 },
      { q: "What does <code>EXISTS (SELECT 1 FROM orders WHERE orders.cust_id = c.id)</code> check?", options: ["Whether orders.cust_id has value 1", "Whether any matching row exists in orders for this customer", "Whether the orders table is empty", "Whether all orders belong to this customer"], answer: 1 },
      { q: "What does <code>NOT EXISTS</code> return?", options: ["TRUE when the subquery returns at least one row", "TRUE when the subquery returns no rows (the condition is not met)", "The count of non-existing rows", "Always FALSE"], answer: 1 },
      { q: "When is <code>EXISTS</code> generally preferred over <code>IN</code>?", options: ["EXISTS is never preferred over IN", "When the subquery list is large or contains NULLs — EXISTS short-circuits on first match", "When the outer query is small", "When the subquery has no WHERE clause"], answer: 1 },
      { q: "What is the NULL trap with <code>NOT IN</code>?", options: ["NOT IN always ignores NULLs", "If the subquery returns any NULL, NOT IN returns no rows (everything is UNKNOWN)", "NOT IN converts NULL to 0", "NOT IN requires the column to be NOT NULL"], answer: 1 },
      { q: "What does the <code>WITH</code> clause (CTE) do?", options: ["Creates a permanent table", "Creates a temporary named result set used in the subsequent query", "Defines a stored procedure", "Creates a view"], answer: 1 },
      { q: "What does CTE stand for?", options: ["Common Table Expression", "Computed Table Entry", "Correlated Table Element", "Complex Table Extension"], answer: 0 },
      { q: "What is the main advantage of CTEs over subqueries?", options: ["CTEs are always faster", "CTEs improve readability and can be referenced multiple times in the same query", "CTEs create permanent objects", "CTEs support more functions"], answer: 1 },
      { q: "Can a CTE be referenced multiple times in the same query?", options: ["No, only once", "Yes, a CTE can be referenced multiple times unlike an inline subquery", "Only in PostgreSQL", "Only recursive CTEs can be referenced multiple times"], answer: 1 },
      { q: "What is a recursive CTE?", options: ["A CTE inside another CTE", "A CTE that references itself to process hierarchical or iterative data", "A CTE with more than one result column", "A CTE with a window function"], answer: 1 },
      { q: "Which keyword is required for a recursive CTE?", options: ["LOOP", "RECURSIVE (WITH RECURSIVE in standard SQL / PostgreSQL)", "ITERATE", "RECURSE"], answer: 1 },
      { q: "What are the two parts of a recursive CTE?", options: ["Header and body", "Base case (anchor member) and recursive case (recursive member) combined with UNION ALL", "Left part and right part", "Init and loop"], answer: 1 },
      { q: "What is a common use case for recursive CTEs?", options: ["Aggregating large datasets", "Traversing hierarchical data like org charts or folder structures", "Replacing window functions", "Generating random data"], answer: 1 },
      { q: "Can you use <code>ORDER BY</code> inside a CTE definition?", options: ["Yes, always", "Only in MySQL", "No — ORDER BY in a CTE has no effect in standard SQL; order in the outer query instead", "Yes, but only for the first CTE"], answer: 2 },
      { q: "What does <code>SELECT name FROM employees WHERE salary > (SELECT AVG(salary) FROM employees)</code> return?", options: ["Names of all employees", "Names of employees earning above the company average salary", "The average salary", "An error because subquery returns a value, not a table"], answer: 1 },
      { q: "How do you define multiple CTEs in one query?", options: ["WITH cte1 AS (...), cte2 AS (...) SELECT ...", "WITH cte1 AS (...) WITH cte2 AS (...) SELECT ...", "CTE1 AS (...); CTE2 AS (...); SELECT ...", "WITH (cte1 AS (...), cte2 AS (...)) SELECT ..."], answer: 0 },
      { q: "What does <code>IN (SELECT id FROM active_users)</code> do?", options: ["Returns rows where the column matches any id returned by the subquery", "Returns rows where the column matches all ids returned by the subquery", "Returns rows where the column does NOT match the subquery result", "Returns a single boolean value"], answer: 0 },
      { q: "When does a subquery in FROM require an alias?", options: ["Never", "Only in PostgreSQL", "Always — derived tables (inline views) must be given an alias", "Only when SELECT * is used"], answer: 2 },
      { q: "What is the difference between a CTE and a VIEW?", options: ["They are identical", "A CTE is temporary and only exists for the duration of the query; a VIEW is a permanent saved query", "A VIEW is faster than a CTE", "A CTE requires CREATE permission"], answer: 1 }
    ]
  };
