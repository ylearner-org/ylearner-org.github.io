  <script>
  window.QUIZ_DATA = {
    title: "SQL Basics Quiz",
    questions: [
      { q: "What does the <code>SELECT *</code> statement return?", options: ["Only the first column", "All columns from the table", "Only numeric columns", "Only unique rows"], answer: 1 },
      { q: "Which clause specifies the table to query?", options: ["GET", "TABLE", "FROM", "SOURCE"], answer: 2 },
      { q: "What is the correct order of clauses in a basic SELECT query?", options: ["FROM → WHERE → SELECT", "SELECT → WHERE → FROM", "SELECT → FROM → WHERE", "WHERE → SELECT → FROM"], answer: 2 },
      { q: "Which clause filters rows BEFORE grouping?", options: ["HAVING", "LIMIT", "WHERE", "FILTER"], answer: 2 },
      { q: "What does <code>ORDER BY salary DESC</code> do?", options: ["Sorts salary from lowest to highest", "Removes duplicate salaries", "Sorts salary from highest to lowest", "Filters out NULL salaries"], answer: 2 },
      { q: "What is the default sort order of ORDER BY?", options: ["DESC (descending)", "ASC (ascending)", "Random", "Insertion order"], answer: 1 },
      { q: "What does <code>LIMIT 10</code> do?", options: ["Returns the 10th row only", "Returns a maximum of 10 rows", "Skips the first 10 rows", "Returns all rows except the last 10"], answer: 1 },
      { q: "What does <code>LIMIT 10 OFFSET 20</code> return?", options: ["The first 20 rows", "Rows 1–10", "Rows 21–30 (skip 20, take 10)", "Rows 10–20"], answer: 2 },
      { q: "What does <code>SELECT DISTINCT city FROM customers</code> return?", options: ["All city values including duplicates", "One row per unique city value", "The number of unique cities", "Cities sorted alphabetically"], answer: 1 },
      { q: "Can <code>DISTINCT</code> be applied to multiple columns?", options: ["No, only one column at a time", "Yes, it removes rows where ALL selected columns are identical", "Yes, it removes rows where ANY selected column matches", "No, use GROUP BY instead"], answer: 1 },
      { q: "What is a column alias?", options: ["A secondary table name", "An alternative name given to a column in the output using AS", "A column copy", "A hidden column"], answer: 1 },
      { q: "Which of these correctly creates a column alias?", options: ["SELECT salary NAMED monthly", "SELECT salary AS monthly_pay", "SELECT salary = monthly", "ALIAS salary AS monthly FROM employees"], answer: 1 },
      { q: "Is the <code>AS</code> keyword required for aliases?", options: ["Yes, always", "No, it is optional — space works too", "Yes in MySQL, No in PostgreSQL", "Only for table aliases"], answer: 1 },
      { q: "Can a column alias defined in SELECT be used in the same query's WHERE clause?", options: ["Yes, always", "No — WHERE is evaluated before SELECT aliases are assigned", "Only in MySQL", "Only in PostgreSQL"], answer: 1 },
      { q: "What does <code>SELECT first_name, last_name FROM employees WHERE department = 'HR'</code> return?", options: ["All columns from HR employees", "first_name and last_name for all employees", "first_name and last_name for employees in the HR department", "The HR department table"], answer: 2 },
      { q: "Which comparison operator means \"not equal to\" in SQL?", options: ["!=", "!==", "NOT =", "Both != and <>"], answer: 3 },
      { q: "What does <code>SELECT COUNT(*) FROM orders</code> return?", options: ["The sum of all order values", "The total number of rows in orders", "The number of unique orders", "The number of non-NULL rows"], answer: 1 },
      { q: "How do you sort by multiple columns in SQL?", options: ["ORDER BY col1 AND col2", "ORDER BY col1, col2", "ORDER BY (col1, col2)", "SORT col1 THEN col2"], answer: 1 },
      { q: "What happens when you <code>ORDER BY</code> a column with NULL values?", options: ["NULL rows are excluded", "NULLs are always sorted first", "NULLs are always sorted last", "Behavior depends on the database (NULLS FIRST / NULLS LAST)"], answer: 3 },
      { q: "Which keyword is used to comment a single line in SQL?", options: ["//", "#", "-- ", "/* */"], answer: 2 },
      { q: "What does <code>SELECT 2 + 3</code> return in SQL?", options: ["An error", "23 (string concat)", "5", "Null"], answer: 2 },
      { q: "What is the purpose of <code>OFFSET</code> in pagination?", options: ["Limits total rows returned", "Skips a specified number of rows before returning results", "Offsets column widths", "Orders results by offset value"], answer: 1 },
      { q: "Which statement selects employees earning more than 50000?", options: ["SELECT * FROM employees HAVING salary > 50000", "SELECT * FROM employees WHERE salary > 50000", "SELECT * FROM employees FILTER salary > 50000", "SELECT salary > 50000 FROM employees"], answer: 1 },
      { q: "What does <code>SELECT DISTINCT department, job_title FROM employees</code> return?", options: ["One row per unique department", "One row per unique job_title", "One row per unique combination of department AND job_title", "One row per employee"], answer: 2 },
      { q: "Can you use <code>ORDER BY</code> on a column not in the SELECT list?", options: ["No, you must SELECT a column to ORDER BY it", "Yes, you can ORDER BY any column in the table", "Only in PostgreSQL", "Only when using DISTINCT"], answer: 1 }
    ]
  };
