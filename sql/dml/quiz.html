  <script>
  window.QUIZ_DATA = {
    title: "SQL Data Modification Quiz",
    questions: [
      { q: "What is the correct syntax to insert a single row?", options: ["ADD INTO employees VALUES (1, 'Alice', 50000);", "INSERT employees VALUES (1, 'Alice', 50000);", "INSERT INTO employees VALUES (1, 'Alice', 50000);", "PUT INTO employees VALUES (1, 'Alice', 50000);"], answer: 2 },
      { q: "What is the advantage of specifying column names in an INSERT statement?", options: ["It is required by all databases", "It makes the query faster", "It makes the INSERT resilient to column order changes and allows omitting columns with defaults", "It avoids the need for a WHERE clause"], answer: 2 },
      { q: "What does <code>INSERT INTO target SELECT * FROM source</code> do?", options: ["Copies the source table structure only", "Copies all rows from source into target", "Creates a new table from source", "Updates target rows using source data"], answer: 1 },
      { q: "What is the correct syntax to update all employees' salary by 10%?", options: ["MODIFY employees SET salary = salary * 1.1;", "UPDATE employees salary = salary * 1.1;", "UPDATE employees SET salary = salary * 1.1;", "CHANGE salary IN employees TO salary * 1.1;"], answer: 2 },
      { q: "What happens if you run <code>UPDATE employees SET salary = 99999</code> with no WHERE clause?", options: ["Nothing changes", "Only the first row is updated", "ALL rows in the table are updated", "An error is raised"], answer: 2 },
      { q: "How do you delete all rows from a table using DELETE?", options: ["DELETE FROM employees WHERE ALL;", "DELETE ALL FROM employees;", "DELETE FROM employees;", "REMOVE * FROM employees;"], answer: 2 },
      { q: "What is the difference between DELETE and TRUNCATE?", options: ["They are identical", "DELETE removes rows one at a time and can be rolled back; TRUNCATE removes all rows quickly but may not be rollable in all databases", "TRUNCATE is always slower", "DELETE cannot have a WHERE clause"], answer: 1 },
      { q: "Can DELETE be used with a WHERE clause to remove specific rows?", options: ["No — DELETE removes all rows", "Yes — WHERE clause specifies which rows to delete", "Only in MySQL", "Only with a subquery"], answer: 1 },
      { q: "What does a database transaction do?", options: ["Creates a backup", "Groups one or more SQL statements into an atomic unit that either all succeed or all fail", "Encrypts data", "Creates a temporary table"], answer: 1 },
      { q: "Which command starts a transaction in most SQL databases?", options: ["START", "OPEN TRANSACTION", "BEGIN or BEGIN TRANSACTION", "INIT TRANSACTION"], answer: 2 },
      { q: "What does COMMIT do?", options: ["Undoes all changes since the last transaction began", "Saves all changes made in the current transaction permanently", "Creates a savepoint", "Starts a new transaction"], answer: 1 },
      { q: "What does ROLLBACK do?", options: ["Commits the transaction", "Undoes all changes made since the current transaction began", "Creates a savepoint", "Pauses the transaction"], answer: 1 },
      { q: "What does SAVEPOINT do in a transaction?", options: ["Commits part of a transaction", "Creates a named point within a transaction to which you can partially rollback", "Ends the transaction", "Creates a permanent checkpoint"], answer: 1 },
      { q: "What does ACID stand for?", options: ["Atomicity, Consistency, Isolation, Durability", "Automation, Concurrency, Integrity, Distribution", "Access, Cache, Index, Data", "Accuracy, Completeness, Integrity, Data"], answer: 0 },
      { q: "What does the ATOMICITY property guarantee?", options: ["Each transaction runs in isolation", "A transaction either fully completes or fully rolls back — no partial updates", "Committed data survives crashes", "Transactions run in strict sequence"], answer: 1 },
      { q: "What does the ISOLATION property ensure?", options: ["Data is accurate", "Changes are permanent", "Concurrent transactions do not interfere with each other", "The system recovers from crashes"], answer: 2 },
      { q: "What is a dirty read?", options: ["Reading NULL values", "Reading committed but old data", "Reading data written by an uncommitted transaction", "Reading data from a deleted row"], answer: 2 },
      { q: "What does UPSERT do?", options: ["Inserts and updates simultaneously on separate tables", "Inserts a row if it does not exist, or updates it if it does (based on a conflict/unique key)", "Deletes and reinserts rows", "Updates only uppercase string values"], answer: 1 },
      { q: "Which standard SQL clause handles UPSERT in PostgreSQL?", options: ["MERGE", "INSERT OR REPLACE", "INSERT ... ON CONFLICT DO UPDATE", "UPSERT INTO"], answer: 2 },
      { q: "What does <code>ON CONFLICT DO NOTHING</code> do?", options: ["Raises an error on conflict", "Silently ignores the INSERT if a conflict (duplicate key) occurs", "Deletes the conflicting row", "Updates the conflicting row"], answer: 1 },
      { q: "What does <code>EXCLUDED</code> refer to in an ON CONFLICT DO UPDATE clause?", options: ["Rows excluded from the result", "The values that were proposed for insertion (the conflicting new row)", "The existing row in the table", "Rows that were deleted"], answer: 1 },
      { q: "What is the risk of running UPDATE or DELETE without a WHERE clause in production?", options: ["No risk — SQL is safe", "The query will fail automatically", "You may accidentally modify or delete ALL rows in the table", "The query will only affect 1000 rows maximum"], answer: 2 },
      { q: "Which SQL statement can insert multiple rows in a single statement?", options: ["Only one row per INSERT", "INSERT INTO t VALUES (1,'a'),(2,'b'),(3,'c');", "Multi-row insert requires a loop", "Only INSERT INTO ... SELECT can insert multiple rows"], answer: 1 },
      { q: "What does <code>TRUNCATE TABLE employees</code> do?", options: ["Drops and recreates the table", "Removes all rows from employees quickly, preserving the table structure", "Removes only the first 1000 rows", "Removes the table and all its indexes"], answer: 1 },
      { q: "What is a phantom read in concurrent transactions?", options: ["A read that returns NULL", "A situation where a transaction re-reads rows and finds new rows inserted by another committed transaction", "Reading an uncommitted row", "A query returning zero results"], answer: 1 }
    ]
  };
