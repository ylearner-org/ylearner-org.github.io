  window.QUIZ_DATA = {
    title: "SQL Tables & Schema Quiz",
    questions: [
      { q: "Which data type stores variable-length character strings up to a maximum length?", options: ["CHAR", "VARCHAR", "TEXT", "STRING"], answer: 1 },
      { q: "What is the difference between <code>CHAR(10)</code> and <code>VARCHAR(10)</code>?", options: ["CHAR is faster to read; VARCHAR is slower", "CHAR always uses 10 bytes; VARCHAR uses only as many bytes as the actual string length", "VARCHAR allows Unicode; CHAR does not", "CHAR allows NULL; VARCHAR does not"], answer: 1 },
      { q: "Which SQL data type stores whole numbers without decimals?", options: ["DECIMAL", "FLOAT", "INT", "NUMERIC"], answer: 2 },
      { q: "Which data type is best for storing monetary values requiring exact precision?", options: ["FLOAT", "DOUBLE", "DECIMAL or NUMERIC", "MONEY"], answer: 2 },
      { q: "What is the correct syntax to create a table?", options: ["MAKE TABLE employees (id INT);", "NEW TABLE employees (id INT);", "CREATE TABLE employees (id INT);", "BUILD TABLE employees (id INT);"], answer: 2 },
      { q: "What does <code>NOT NULL</code> constraint do?", options: ["Prevents the column from storing any value", "Ensures the column cannot contain NULL (must always have a value)", "Makes the column a primary key", "Prevents duplicate values"], answer: 1 },
      { q: "What is a PRIMARY KEY?", options: ["The first column in the table", "A column or combination of columns that uniquely identifies each row and cannot be NULL", "A foreign key pointing to a parent table", "A column with an index"], answer: 1 },
      { q: "Can a table have more than one PRIMARY KEY?", options: ["Yes, up to 3", "Yes, unlimited", "No, a table can have only one primary key (but it can span multiple columns as a composite key)", "No, primary keys are only on single columns"], answer: 2 },
      { q: "What is a FOREIGN KEY?", options: ["A key imported from another database", "A column that references the PRIMARY KEY or UNIQUE key of another table", "A unique key on a non-primary column", "An alternate primary key"], answer: 1 },
      { q: "What does a UNIQUE constraint do?", options: ["Ensures values cannot be NULL", "Ensures all values in a column (or column set) are distinct", "Makes the column a primary key", "Speeds up queries on that column"], answer: 1 },
      { q: "How does UNIQUE differ from PRIMARY KEY?", options: ["They are identical", "UNIQUE allows NULL values (subject to dialect); PRIMARY KEY does not allow NULL", "PRIMARY KEY allows duplicates; UNIQUE does not", "UNIQUE cannot span multiple columns"], answer: 1 },
      { q: "What does a CHECK constraint do?", options: ["Validates data by enforcing a condition on column values", "Checks if the table exists", "Verifies foreign key references", "Validates column data types"], answer: 0 },
      { q: "What does DEFAULT do in a column definition?", options: ["Sets the column as the primary key", "Provides a value automatically when no value is specified on INSERT", "Prevents NULL values", "Makes the column hidden"], answer: 1 },
      { q: "Which statement adds a new column to an existing table?", options: ["ALTER TABLE employees ADD COLUMN email VARCHAR(100);", "UPDATE TABLE employees ADD email VARCHAR(100);", "INSERT COLUMN email VARCHAR(100) INTO employees;", "MODIFY TABLE employees ADD email VARCHAR(100);"], answer: 0 },
      { q: "What is the difference between <code>DROP TABLE</code> and <code>TRUNCATE TABLE</code>?", options: ["They are identical", "DROP TABLE removes the table and its structure; TRUNCATE removes all rows but keeps the table structure", "TRUNCATE is slower than DROP", "DROP only works on empty tables"], answer: 1 },
      { q: "Can you recover data after <code>DROP TABLE</code>?", options: ["Yes, with RESTORE TABLE", "Yes, with ROLLBACK if inside a transaction in some databases", "No, it is always permanent", "Yes, data stays in a recycle bin"], answer: 1 },
      { q: "Which SQL type stores TRUE/FALSE values?", options: ["BIT", "BOOLEAN", "TINYINT(1) in MySQL / BOOLEAN in PostgreSQL", "Both B and C depending on database"], answer: 3 },
      { q: "What does <code>SERIAL</code> or <code>AUTO_INCREMENT</code> do?", options: ["Creates a sequence and automatically inserts the next integer on each INSERT", "Serializes row data to JSON", "Increments all numeric values by 1", "Locks the column for concurrent writes"], answer: 0 },
      { q: "Which constraint type ensures referential integrity between tables?", options: ["CHECK", "NOT NULL", "FOREIGN KEY", "UNIQUE"], answer: 2 },
      { q: "What does <code>ALTER TABLE employees DROP COLUMN age</code> do?", options: ["Sets age column values to NULL", "Removes the age column and its data permanently from the table", "Renames the age column", "Hides the age column from queries"], answer: 1 },
      { q: "Which data type stores dates AND times?", options: ["DATE", "TIME", "TIMESTAMP or DATETIME", "INTERVAL"], answer: 2 },
      { q: "What is a composite primary key?", options: ["A primary key made of a CHAR and INT column", "A primary key spanning two or more columns where the combination is unique", "A primary key with a CHECK constraint", "An auto-increment primary key"], answer: 1 },
      { q: "What happens when you try to insert a value that violates a FOREIGN KEY constraint?", options: ["The row is inserted with NULL for the foreign key", "The database raises an error and rejects the INSERT", "The referenced table is automatically updated", "The constraint is ignored"], answer: 1 },
      { q: "Which data type is best for storing large text (e.g., blog posts)?", options: ["VARCHAR(255)", "CHAR(1000)", "TEXT", "LONGCHAR"], answer: 2 },
      { q: "What does <code>ON DELETE CASCADE</code> do on a FOREIGN KEY?", options: ["Prevents deletion of referenced rows", "Automatically deletes child rows when the referenced parent row is deleted", "Sets foreign key values to NULL on parent delete", "Prevents any DELETE on the parent table"], answer: 1 }
    ]
