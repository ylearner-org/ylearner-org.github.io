    title: "SQL Joins Quiz",
    questions: [
      { q: "What does a JOIN do in SQL?", options: ["Splits one table into multiple tables", "Combines rows from two or more tables based on a related column", "Merges two databases", "Appends rows to a table"], answer: 1 },
      { q: "What does an INNER JOIN return?", options: ["All rows from the left table", "All rows from both tables", "Only rows where the join condition matches in BOTH tables", "All rows from the right table"], answer: 2 },
      { q: "What does a LEFT JOIN return?", options: ["Only matching rows", "All rows from the left table plus matching rows from the right (NULLs for non-matches)", "All rows from the right table", "The intersection of both tables"], answer: 1 },
      { q: "In a LEFT JOIN, what appears in the right table columns for rows with no match?", options: ["0", "Empty string", "NULL", "The row is excluded"], answer: 2 },
      { q: "What does a RIGHT JOIN return?", options: ["All rows from the left table", "All rows from the right table plus matching rows from the left (NULLs for non-matches)", "Only matching rows", "All rows from both tables"], answer: 1 },
      { q: "Can every RIGHT JOIN be rewritten as a LEFT JOIN?", options: ["No, they are fundamentally different", "Yes, by swapping the table order", "Only in MySQL", "Only when both tables have the same number of rows"], answer: 1 },
      { q: "What does a FULL OUTER JOIN return?", options: ["Only matching rows", "All rows from the left table only", "All rows from BOTH tables, with NULLs where there is no match on either side", "The Cartesian product"], answer: 2 },
      { q: "Which JOIN type produces a Cartesian product (every row from table A paired with every row from table B)?", options: ["INNER JOIN", "LEFT JOIN", "CROSS JOIN", "SELF JOIN"], answer: 2 },
      { q: "If table A has 5 rows and table B has 4 rows, how many rows does a CROSS JOIN produce?", options: ["5", "4", "9", "20"], answer: 3 },
      { q: "What is a SELF JOIN?", options: ["A join of a table with itself using aliases", "A join with no ON condition", "A join that returns only one row", "A join using the PRIMARY KEY only"], answer: 0 },
      { q: "What is a common use case for a SELF JOIN?", options: ["Joining two different tables", "Finding hierarchical relationships within a single table (e.g., employee and their manager)", "Avoiding NULL values", "Combining aggregated results"], answer: 1 },
      { q: "Which clause specifies the join condition?", options: ["WHERE", "MATCH", "ON", "LINK"], answer: 2 },
      { q: "What is the difference between using ON and WHERE in a LEFT JOIN?", options: ["They are identical", "ON filters during join (left rows kept); WHERE filters AFTER join (can eliminate unmatched left rows)", "WHERE is required; ON is optional", "ON is for INNER JOIN only"], answer: 1 },
      { q: "What does <code>SELECT e.name, d.name FROM employees e JOIN departments d ON e.dept_id = d.id</code> do?", options: ["Returns only employees without departments", "Returns all employees with their department names (matched only)", "Returns all departments including those with no employees", "Returns the Cartesian product"], answer: 1 },
      { q: "What is an equi-join?", options: ["A join using the = operator in the ON condition", "A join returning equal numbers of rows from both tables", "A join on UNIQUE columns only", "A join using >= or <="], answer: 0 },
      { q: "How many rows does INNER JOIN produce when no rows match?", options: ["One row of NULLs", "All left rows with NULL right columns", "An error", "Zero rows"], answer: 3 },
      { q: "Which JOIN would you use to find customers who have never placed an order?", options: ["INNER JOIN", "CROSS JOIN", "LEFT JOIN with WHERE orders.id IS NULL", "RIGHT JOIN"], answer: 2 },
      { q: "Can you join more than two tables in a single query?", options: ["No, maximum two tables", "Yes, by chaining multiple JOIN clauses", "Yes, but only in PostgreSQL", "Yes, but only with CROSS JOIN"], answer: 1 },
      { q: "What is a non-equi join?", options: ["A join using an inequality condition (>, <, BETWEEN) instead of =", "A join on two different tables with no related column", "A join returning no results", "A CROSS JOIN"], answer: 0 },
      { q: "What is NATURAL JOIN?", options: ["A join that automatically matches columns with the same name in both tables", "A join without a WHERE clause", "A join that returns all rows", "A synonym for INNER JOIN"], answer: 0 },
      { q: "Which JOIN type is equivalent to INNER JOIN in most SQL databases?", options: ["FULL JOIN", "LEFT JOIN", "JOIN (without qualifier)", "OUTER JOIN"], answer: 2 },
      { q: "What happens with duplicate column names in a join result?", options: ["SQL raises an error", "Both columns appear, potentially causing ambiguity — use table aliases to qualify column names", "Only the left table column appears", "Only the right table column appears"], answer: 1 },
      { q: "Which is typically more performant: JOIN or subquery doing the same thing?", options: ["Subquery is always faster", "JOIN is always faster", "Modern query optimizers often produce the same plan; write whichever is clearer", "JOIN is only faster with indexes"], answer: 2 },
      { q: "What does <code>SELECT * FROM a FULL OUTER JOIN b ON a.id = b.id WHERE a.id IS NULL OR b.id IS NULL</code> return?", options: ["All rows from both tables", "Only matching rows", "All rows that do NOT have a match in the other table (symmetric difference)", "Nothing"], answer: 2 },
      { q: "What should you always create on JOIN columns for performance?", options: ["A CHECK constraint", "A DEFAULT value", "An index (on the foreign key column especially)", "A VIEW"], answer: 2 }
