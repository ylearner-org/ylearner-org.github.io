  <script>
  window.QUIZ_DATA = {
    title: "Advanced SQL Quiz",
    questions: [
      { q: "What is a database index?", options: ["A backup of the table", "A data structure that speeds up data retrieval at the cost of extra storage and slower writes", "A constraint that prevents duplicates", "A foreign key reference"], answer: 1 },
      { q: "Which type of index is used by default in most relational databases?", options: ["Hash index", "Full-text index", "B-tree (balanced tree) index", "Bitmap index"], answer: 2 },
      { q: "What is a composite index?", options: ["An index on a computed column", "An index covering multiple columns", "An index shared between tables", "An index that auto-updates"], answer: 1 },
      { q: "What does a covering index do?", options: ["Covers all tables in the database", "Includes all columns needed by a query so the database does not need to read the actual table rows", "Covers only NULL values", "Automatically covers new columns added to the table"], answer: 1 },
      { q: "What is a trade-off of adding more indexes to a table?", options: ["Queries become slower", "INSERT, UPDATE, and DELETE operations become slower because indexes must be maintained", "Storage decreases", "Constraints become less effective"], answer: 1 },
      { q: "What does a database VIEW do?", options: ["Stores data separately from base tables", "Stores a saved SELECT query that can be queried like a table (virtual table)", "Creates a physical copy of table data", "Automatically updates table statistics"], answer: 1 },
      { q: "Can you always insert data through a VIEW?", options: ["Yes, always", "No — only simple views on a single table without DISTINCT, GROUP BY, or aggregates are typically updatable", "Yes, but only in MySQL", "No, views are always read-only"], answer: 1 },
      { q: "What is the main benefit of using VIEWs?", options: ["They always improve query performance", "They simplify complex queries, provide data abstraction, and can restrict access to sensitive columns", "They store data as JSON", "They replace the need for indexes"], answer: 1 },
      { q: "What is a stored procedure?", options: ["A saved SELECT query", "A precompiled set of SQL statements stored in the database that can be executed with CALL or EXEC", "An automatically triggered action", "A type of index"], answer: 1 },
      { q: "What is the difference between a stored procedure and a function?", options: ["They are identical", "A function must return a value and can be used in SELECT; a stored procedure does not need to return a value and cannot typically be used in SELECT", "A stored procedure can only SELECT; a function can also INSERT", "Functions are always faster"], answer: 1 },
      { q: "What is a database trigger?", options: ["A scheduled job", "An action automatically executed in response to INSERT, UPDATE, or DELETE events on a table", "A stored procedure called manually", "An index update event"], answer: 1 },
      { q: "Which trigger timing fires BEFORE the DML operation completes?", options: ["AFTER trigger", "INSTEAD OF trigger", "BEFORE trigger", "AROUND trigger"], answer: 2 },
      { q: "What is a common use case for BEFORE triggers?", options: ["Logging changes after they occur", "Validating or transforming data before it is written to the table", "Sending email notifications", "Updating statistics"], answer: 1 },
      { q: "What is a common use case for AFTER triggers?", options: ["Preventing invalid inserts", "Auditing changes — writing to a log table after a row is modified", "Modifying the data before insert", "Auto-generating primary keys"], answer: 1 },
      { q: "What is normalization?", options: ["Scaling all numeric values to 0–1", "Organizing a database to reduce data redundancy and improve data integrity by applying normal forms", "Converting strings to lowercase", "Adding indexes to all foreign keys"], answer: 1 },
      { q: "What does First Normal Form (1NF) require?", options: ["No partial dependencies", "No transitive dependencies", "Atomic (indivisible) column values, no repeating groups, and a primary key", "No redundant tables"], answer: 2 },
      { q: "What does Second Normal Form (2NF) require?", options: ["No transitive dependencies", "All non-key columns must be fully dependent on the ENTIRE primary key (eliminates partial dependencies)", "All values must be atomic", "No NULL values"], answer: 1 },
      { q: "What does Third Normal Form (3NF) require?", options: ["No partial dependencies", "All columns must be atomic", "No transitive dependencies — non-key columns must depend ONLY on the primary key, not on other non-key columns", "No foreign keys"], answer: 2 },
      { q: "What is denormalization?", options: ["Removing all indexes", "Intentionally adding redundancy to improve read performance at the cost of update complexity", "Converting a relational DB to NoSQL", "Removing foreign key constraints"], answer: 1 },
      { q: "What is a materialized view?", options: ["A regular view with a custom CSS style", "A view that physically stores its query results and must be refreshed when base data changes", "A view that only shows the most recent data", "A view that cannot be queried"], answer: 1 },
      { q: "Which command creates an index on the email column of the users table?", options: ["ADD INDEX ON users(email);", "INDEX users(email);", "CREATE INDEX idx_users_email ON users(email);", "MAKE INDEX users.email;"], answer: 2 },
      { q: "What is a unique index?", options: ["An index that only contains NULL values", "An index that enforces uniqueness of values in the indexed column(s)", "An index covering all columns", "The only index allowed per table"], answer: 1 },
      { q: "What does BCNF (Boyce-Codd Normal Form) address beyond 3NF?", options: ["Multi-valued dependencies", "Join dependencies", "Cases where 3NF is not sufficient due to overlapping candidate keys", "NULL values in primary keys"], answer: 2 },
      { q: "Can multiple triggers be defined on the same table and event?", options: ["No, only one trigger per table/event combination", "Yes, multiple triggers can exist for the same table event, executing in a defined or implementation-specific order", "Only in Oracle", "Only AFTER triggers can be multiple"], answer: 1 },
      { q: "What is query plan analysis used for?", options: ["Writing SQL queries", "Understanding how the database engine executes a query to identify performance bottlenecks", "Backing up query results", "Creating documentation"], answer: 1 }
    ]
  };
