      { q: "What does <code>ABS(-15)</code> return?", options: ["-15", "0", "15", "1"], answer: 2 },
      { q: "What does <code>MOD(10, 3)</code> return?", options: ["3", "1", "0", "3.33"], answer: 1 },
      { q: "What does <code>COUNT(*)</code> count?", options: ["Only non-NULL values", "Only distinct values", "All rows including NULLs", "Only numeric columns"], answer: 2 },
      { q: "What is the difference between <code>COUNT(*)</code> and <code>COUNT(column)</code>?", options: ["They are identical", "COUNT(*) counts all rows; COUNT(column) counts only non-NULL values in that column", "COUNT(column) is faster", "COUNT(*) only works with GROUP BY"], answer: 1 },
      { q: "What does <code>SUM(salary)</code> do with NULL values?", options: ["Returns NULL if any value is NULL", "Treats NULL as 0", "Ignores NULL values in the sum", "Returns an error"], answer: 1 },
      { q: "What does <code>AVG(score)</code> calculate?", options: ["Sum of all scores", "Sum divided by count of all rows including NULLs", "Sum of non-NULL scores divided by count of non-NULL scores", "Median score"], answer: 2 },
      { q: "Which function returns the current date and time?", options: ["TODAY()", "GETDATE() or NOW() (varies by database)", "CURRENT()", "DATETIME()"], answer: 1 },
      { q: "What does <code>EXTRACT(YEAR FROM hire_date)</code> return?", options: ["The full date", "The year portion of hire_date as a number", "The month and day", "A formatted date string"], answer: 1 },
      { q: "What does <code>COALESCE(NULL, NULL, 'default')</code> return?", options: ["NULL", "The first non-NULL value — in this case 'default'", "An error", "0"], answer: 1 },
      { q: "What does <code>NULLIF(10, 10)</code> return?", options: ["10", "0", "NULL", "FALSE"], answer: 2 },
      { q: "What does <code>NULLIF(column, 0)</code> prevent when used with division?", options: ["Returns 0 instead of an error", "Division by zero errors — returns NULL when column equals 0", "Overflow errors", "NULL propagation"], answer: 1 },
      { q: "What is the purpose of a CASE expression in SQL?", options: ["To declare variables", "To add conditional logic to SELECT, WHERE, or ORDER BY", "To create stored procedures", "To handle NULL values only"], answer: 1 },
      { q: "What does a simple CASE expression look like?", options: ["CASE col WHEN val1 THEN result1 WHEN val2 THEN result2 ELSE default END", "IF col = val1 THEN result1 ELSE result2", "SWITCH(col) CASE val1: result1", "CASE(col, val1, result1, val2, result2)"], answer: 0 },
      { q: "What does the ELSE clause in CASE return if all WHEN conditions are false and ELSE is omitted?", options: ["An error", "0", "An empty string", "NULL"], answer: 3 },
      { q: "Which function returns the smaller of two values?", options: ["LEAST()", "MIN()", "LOWER()", "SMALLEST()"], answer: 0 },
      { q: "What does <code>FLOOR(4.9)</code> return?", options: ["5", "4", "4.9", "NULL"], answer: 1 },
