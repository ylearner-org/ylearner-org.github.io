  <script>
  window.QUIZ_DATA = {
    title: "SQL Interview Prep Quiz",
    questions: [
      { q: "What SQL query finds the second highest salary from an employees table?", options: ["SELECT MAX(salary) FROM employees WHERE salary < MAX(salary)", "SELECT MAX(salary) FROM employees WHERE salary NOT IN (SELECT MAX(salary) FROM employees)", "SELECT salary FROM employees ORDER BY salary DESC LIMIT 1 OFFSET 1", "Both B and C work (with caveats)"], answer: 3 },
      { q: "How do you find duplicate rows in a table?", options: ["SELECT * FROM t WHERE count > 1", "SELECT col, COUNT(*) FROM t GROUP BY col HAVING COUNT(*) > 1", "SELECT DISTINCT col FROM t WHERE duplicated = TRUE", "SELECT * FROM t WHERE ROWID IN (SELECT MIN(ROWID) FROM t GROUP BY col)"], answer: 1 },
      { q: "What is the N+1 query problem?", options: ["Running N queries where 1 would suffice", "Running 1 query to get N parent rows, then N separate queries to get child rows — should be replaced by a JOIN", "Joining N tables at once", "Writing queries with N subqueries"], answer: 1 },
      { q: "What does EXPLAIN (or EXPLAIN ANALYZE) show you?", options: ["The SQL query in a readable format", "The query execution plan — showing how the database accesses data, which indexes are used, and estimated costs", "The query runtime only", "All table schemas used"], answer: 1 },
      { q: "What is an index scan vs a full table (sequential) scan?", options: ["They are identical", "An index scan uses the index to find rows quickly; a full table scan reads every row — index scan is usually faster for selective queries", "A full table scan is always faster", "Index scan only works with primary keys"], answer: 1 },
      { q: "How do you delete duplicate rows keeping only one copy?", options: ["DELETE duplicates from the table automatically", "Use a CTE with ROW_NUMBER() partitioned by the duplicate columns and delete where row_number > 1", "DISTINCT removes duplicates permanently", "Use DROP DUPLICATE command"], answer: 1 },
      { q: "What does the following return: <code>SELECT * FROM t WHERE name = NULL</code>?", options: ["All rows where name is NULL", "No rows — use IS NULL instead of = NULL", "An error", "All rows"], answer: 1 },
      { q: "How do you write a query to get the Nth highest salary using window functions?", options: ["SELECT salary FROM (SELECT salary, DENSE_RANK() OVER (ORDER BY salary DESC) AS rnk FROM employees) t WHERE rnk = N", "SELECT salary FROM employees ORDER BY salary DESC LIMIT 1 OFFSET N", "SELECT MAX(salary) FROM employees WHERE salary IN TOP N", "SELECT salary FROM employees WHERE salary = NTH_SALARY(N)"], answer: 0 },
      { q: "What is a self-join used for in interview contexts?", options: ["Joining a table to itself to compare rows within the same table (e.g., managers and their reports)", "Duplicating table data", "Avoiding JOINs with other tables", "Merging two tables with the same schema"], answer: 0 },
      { q: "What does <code>COALESCE(a, b, c)</code> return?", options: ["The average of a, b, c", "The sum of non-NULL values", "The first non-NULL value among a, b, c", "NULL if any value is NULL"], answer: 2 },
      { q: "How do you pivot rows into columns in SQL?", options: ["Use PIVOT statement (some databases) or CASE with GROUP BY aggregation", "Use TRANSPOSE function", "Use ORDER BY with CASE", "Use UNION ALL"], answer: 0 },
      { q: "What is the difference between UNION and UNION ALL?", options: ["UNION returns more rows", "UNION removes duplicates between result sets; UNION ALL includes all rows including duplicates", "UNION ALL is slower always", "UNION requires the same column types; UNION ALL does not"], answer: 1 },
      { q: "What SQL pattern finds customers who ordered EVERY product?", options: ["JOIN all products to all orders", "Use division: count distinct products ordered by each customer equals total products", "Use HAVING COUNT(*) > 0", "Use CROSS JOIN with filtering"], answer: 1 },
      { q: "What does a HAVING clause without GROUP BY do?", options: ["It causes an error", "It applies to the entire result set as a single group — useful with aggregate conditions on the whole table", "It is identical to WHERE", "It is ignored"], answer: 1 },
      { q: "How can you improve query performance when filtering on a column?", options: ["Add a SELECT * to include all columns", "Add an index on the filter column", "Use HAVING instead of WHERE", "Use NOT IN instead of WHERE"], answer: 1 },
      { q: "What is a covering index in the context of query optimization?", options: ["An index so large it slows queries", "An index containing all columns the query needs — query can be answered from index alone without reading table rows", "An index on all columns", "An index that covers foreign keys"], answer: 1 },
      { q: "What does <code>SELECT 1</code> inside an EXISTS subquery do versus <code>SELECT *</code>?", options: ["Returns 1 instead of all data — EXISTS only checks for row existence, so SELECT 1 or SELECT * performs the same", "SELECT 1 is faster because it returns less data", "SELECT * causes EXISTS to fail", "SELECT 1 returns a literal column named \"1\""], answer: 0 },
      { q: "How do you find employees who have no manager (NULL manager_id)?", options: ["WHERE manager_id = NULL", "WHERE manager_id IS NULL", "WHERE NOT manager_id", "WHERE manager_id = 0"], answer: 1 },
      { q: "What is the result of dividing by zero in SQL?", options: ["Returns NULL in all databases", "Returns infinity", "Raises a division by zero error in most databases — use NULLIF to avoid", "Returns 0"], answer: 2 },
      { q: "How would you find the running total of sales ordered by date?", options: ["SELECT SUM(sales) FROM t", "SELECT date, SUM(sales) OVER (ORDER BY date) FROM t", "SELECT date, TOTAL(sales) FROM t GROUP BY date", "SELECT date, sales + PREV(sales) FROM t"], answer: 1 },
      { q: "What does <code>CASE WHEN gender = 'M' THEN 1 ELSE 0 END</code> do?", options: ["Filters rows to males only", "Converts the gender column to binary 1/0 — useful for conditional counting", "Changes the gender column permanently", "Creates a new table"], answer: 1 },
      { q: "How do you count only distinct values with an aggregate?", options: ["COUNT(DISTINCT column)", "COUNT(*) WHERE DISTINCT", "DISTINCT COUNT(column)", "SELECT UNIQUE COUNT(column)"], answer: 0 },
      { q: "What SQL pattern generates a sequential row number for each row within a group?", options: ["COUNT(*) GROUP BY group_col", "ROW_NUMBER() OVER (PARTITION BY group_col ORDER BY some_col)", "SEQUENCE() OVER (GROUP BY group_col)", "SELECT ROWID"], answer: 1 },
      { q: "What is the correct approach when a query uses a column in WHERE but the index is not being used?", options: ["Rebuild the index", "Avoid using functions or expressions on the indexed column in WHERE — instead sarg the predicate", "Add more columns to SELECT", "Use HAVING instead of WHERE"], answer: 1 },
      { q: "How do you get the number of rows in each group along with the overall total in one query?", options: ["Run two separate queries and UNION", "Use window function: COUNT(*) OVER () gives total; COUNT(*) with GROUP BY gives per-group counts", "Use ROLLUP", "Use CROSS JOIN with aggregate"], answer: 2 }
    ]
  };
