      { q: "Which media query approach is recommended for mobile-first design?", options: ["max-width breakpoints", "min-width breakpoints", "device-width breakpoints", "height breakpoints"], answer: 1 },

      { q: "What does the <code>srcset</code> attribute on <code>&lt;img&gt;</code> do?", options: ["Sets the image source", "Provides multiple image sources for different screen sizes", "Sets image alt text", "Defines image dimensions"], answer: 1 },
      { q: "What is a CSS breakpoint?", options: ["A CSS syntax error", "A point where layout changes based on screen size", "The maximum CSS file size", "A browser crash point"], answer: 1 },
      { q: "What does <code>1rem</code> equal by default?", options: ["1px", "10px", "16px (root font size)", "1% of viewport"], answer: 2 },
      { q: "Which <code>picture</code> element child provides a fallback image?", options: ["<source>", "<img>", "<fallback>", "<default>"], answer: 1 },
      { q: "What does <code>vmin</code> represent?", options: ["1% of the larger viewport dimension", "1% of the smaller viewport dimension", "1% of viewport width", "1% of viewport height"], answer: 1 },
      { q: "Which CSS technique creates a fluid layout that adjusts based on screen size?", options: ["Fixed-width layout", "Percentage-based widths with flexible units", "Absolute positioning everything", "Using only px units"], answer: 1 },
      { q: "What does <code>@media print</code> apply styles to?", options: ["Printing devices", "Mobile screens", "Touch screens", "High-DPI displays"], answer: 0 },
      { q: "What does <code>object-fit: cover</code> do on a responsive image?", options: ["Stretches image to fill", "Scales image to cover container, possibly cropping", "Scales image to fit without cropping", "Makes image repeat"], answer: 1 },
      { q: "Which unit is always relative to the ROOT element's font size?", options: ["em", "rem", "px", "vw"], answer: 1 },
      { q: "What does <code>@media (orientation: landscape)</code> target?", options: ["Screens in portrait mode", "Screens in landscape mode", "Screens wider than tall", "Both a and c"], answer: 2 },
      { q: "What is the typical mobile-first small breakpoint?", options: ["1200px", "992px", "576px or 480px", "2560px"], answer: 2 },
      { q: "Which CSS feature allows defining layouts that automatically adjust the number of columns?", options: ["float", "position", "CSS Grid with auto-fill/auto-fit", "inline-block"], answer: 2 },
      { q: "What does <code>calc(100% - 20px)</code> do?", options: ["Calculates a fixed value", "Mixes percentage and pixel units in a value", "Sets minimum width", "Sets maximum width"], answer: 1 },
