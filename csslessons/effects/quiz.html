      { q: "What does <code>transition: all 0.3s ease</code> do?", options: ["Animates all properties over 0.3 seconds with ease timing", "Applies a 0.3px border", "Transforms all child elements", "Delays all transitions by 0.3s"], answer: 0 },
      { q: "Which CSS rule defines keyframes for an animation?", options: ["@animate", "@keyframes", "@frames", "@motion"], answer: 1 },
      { q: "What does <code>animation-iteration-count: infinite</code> do?", options: ["Plays animation once", "Plays animation twice", "Loops animation forever", "Pauses animation"], answer: 2 },
      { q: "Which function rotates an element 45 degrees?", options: ["rotate(45deg)", "transform: rotate(45deg)", "spin(45deg)", "angle(45deg)"], answer: 1 },
      { q: "What does <code>transform: scale(2)</code> do?", options: ["Moves element 2px", "Doubles the element's size", "Rotates element 2 degrees", "Skews element by 2%"], answer: 1 },
      { q: "Which property specifies the timing function of a transition?", options: ["transition-delay", "transition-speed", "transition-timing-function", "transition-curve"], answer: 2 },
      { q: "What does <code>filter: blur(5px)</code> do?", options: ["Moves element 5px", "Applies a 5px Gaussian blur to the element", "Sets opacity to 5%", "Adds a 5px shadow"], answer: 1 },
      { q: "What does <code>transform: translateX(50px)</code> do?", options: ["Rotates element 50 degrees", "Scales element by 50%", "Moves element 50px to the right", "Moves element 50px down"], answer: 2 },
      { q: "Which property controls animation playback speed?", options: ["animation-speed", "animation-duration", "animation-rate", "animation-time"], answer: 1 },
      { q: "What does <code>animation-direction: alternate</code> do?", options: ["Plays animation in reverse only", "Plays animation forward, then backward alternately", "Skips every other frame", "Alternates between two animations"], answer: 1 },
      { q: "What does <code>filter: grayscale(100%)</code> do?", options: ["Removes the element", "Converts image to black and white", "Adds grey border", "Sets background to grey"], answer: 1 },
      { q: "Which timing function creates a constant-speed transition?", options: ["ease", "ease-in", "linear", "ease-out"], answer: 2 },
      { q: "What does <code>transform: skewX(30deg)</code> do?", options: ["Rotates element 30 degrees", "Tilts element horizontally by 30 degrees", "Scales element by 30%", "Moves element right by 30px"], answer: 1 },
      { q: "What does <code>animation-fill-mode: forwards</code> do?", options: ["Plays animation forward", "Retains the final keyframe styles after animation ends", "Fills the element with color", "Loops animation forward only"], answer: 1 },
      { q: "What does <code>filter: brightness(0.5)</code> do?", options: ["Doubles brightness", "Halves the brightness", "Inverts colors", "Adds contrast"], answer: 1 },
      { q: "Which CSS property delays the start of a transition?", options: ["transition-wait", "transition-pause", "transition-delay", "transition-start"], answer: 2 },
      { q: "What does <code>transform: translate(-50%, -50%)</code> commonly achieve when combined with absolute positioning?", options: ["Hides the element", "Rotates the element", "Perfectly centers the element relative to its positioned parent", "Scales the element down"], answer: 2 },
      { q: "What does <code>animation-play-state: paused</code> do?", options: ["Stops and resets animation", "Pauses animation at current position", "Slows animation speed", "Disables animation"], answer: 1 },
      { q: "Which function applies multiple transforms?", options: ["transforms()", "multi-transform()", "transform with space-separated values", "transform-list()"], answer: 2 },
      { q: "What does <code>filter: invert(1)</code> do?", options: ["Flips image horizontally", "Inverts all colors", "Makes image transparent", "Converts to greyscale"], answer: 1 },
      { q: "What does <code>transition-property: background-color</code> do?", options: ["Changes background permanently", "Only transitions the background-color property", "Removes all other transitions", "Animates color on load"], answer: 1 },
      { q: "Which <code>@keyframes</code> keyword represents the end state of an animation?", options: ["end", "finish", "to", "100%"], answer: 2 },

      { q: "What does <code>transform-origin: center</code> set?", options: ["The animation start point", "The point around which transformations are applied", "The element's center position", "The flex alignment center"], answer: 1 }
