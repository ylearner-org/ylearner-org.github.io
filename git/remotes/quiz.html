  <script>
  window.QUIZ_DATA = {
    title: "Git Remotes Quiz",
    questions: [
      { q: "What is a remote repository in Git?", options: ["A repository on a different branch", "A version of the repository hosted on a server (e.g., GitHub, GitLab) that the team shares", "A backup of the local repository", "A read-only snapshot"], answer: 1 },
      { q: "What is \"origin\" in Git?", options: ["The first commit ever made", "The default name Git gives to the remote repository when you clone", "The main branch", "The initial author of the repository"], answer: 1 },
      { q: "Which command lists all configured remotes for a repository?", options: ["git remote", "git remote -v (shows URLs too)", "git remotes --list", "git show remotes"], answer: 1 },
      { q: "What does <code>git remote add origin &lt;url&gt;</code> do?", options: ["Creates a new remote repository", "Adds a remote connection named \"origin\" pointing to the specified URL", "Clones the remote repository", "Pushes to the remote"], answer: 1 },
      { q: "What does <code>git fetch origin</code> do?", options: ["Downloads remote changes AND merges them into the current branch", "Downloads remote changes and updates remote-tracking branches, but does NOT merge into local branches", "Pushes local commits to origin", "Deletes all local branches not on remote"], answer: 1 },
      { q: "What does <code>git pull</code> do?", options: ["Pushes local changes to remote", "Downloads AND merges remote changes (equivalent to git fetch + git merge)", "Downloads changes without merging", "Fetches tags only"], answer: 1 },
      { q: "What is the difference between <code>git fetch</code> and <code>git pull</code>?", options: ["They are identical", "git fetch downloads without merging; git pull fetches AND merges (or rebases) into the current branch", "git pull downloads; git fetch merges", "git fetch only gets tags"], answer: 1 },
      { q: "What does <code>git push origin main</code> do?", options: ["Downloads the main branch from origin", "Merges main into origin", "Pushes local main branch commits to the origin remote", "Creates a new remote branch"], answer: 2 },
      { q: "What does <code>git push -u origin feature/login</code> do?", options: ["Force pushes to main", "Pushes the feature/login branch and sets it to track origin/feature/login (sets upstream tracking)", "Deletes the remote feature/login branch", "Creates a pull request"], answer: 1 },
      { q: "What is a tracking branch?", options: ["A branch that follows another local branch", "A local branch configured to track a specific remote branch — git pull/push know where to go without specifying", "A read-only copy of a remote branch", "A branch created on a tag"], answer: 1 },
      { q: "What does <code>origin/main</code> refer to?", options: ["The local main branch", "The remote-tracking branch — a local reference showing the state of main on the origin remote at the last fetch", "A tag on main", "The first commit on main"], answer: 1 },
      { q: "What is a pull request (PR)?", options: ["A git command to pull from remote", "A request to a repository maintainer to review and merge changes from a branch", "A request to pull a Docker image", "An automated deployment trigger"], answer: 1 },
      { q: "What is a fork on GitHub?", options: ["A branch of a repository", "A personal copy of someone else's repository under your GitHub account", "A type of merge conflict", "A commit that splits history"], answer: 1 },
      { q: "What is the typical GitHub open source workflow?", options: ["Clone → Edit main → Push", "Fork → Clone fork → Branch → Commit → Push to fork → Open PR to upstream", "Clone → Push directly to main", "Download ZIP → Edit → Email maintainer"], answer: 1 },
      { q: "What is an \"upstream\" remote in the context of a fork?", options: ["The origin remote on your fork", "The original repository you forked from — usually named \"upstream\" to distinguish from \"origin\" (your fork)", "The deployment server", "The main branch on origin"], answer: 1 },
      { q: "Which command adds the original repo as \"upstream\" after forking?", options: ["git remote set upstream &lt;url&gt;", "git fork --upstream &lt;url&gt;", "git remote add upstream &lt;url&gt;", "git add remote --name upstream &lt;url&gt;"], answer: 2 },
      { q: "What does <code>git pull upstream main</code> do in a fork workflow?", options: ["Pushes local changes to upstream", "Syncs the local main with the latest changes from the original repository", "Creates a pull request", "Downloads all upstream branches"], answer: 1 },
      { q: "What is a force push (<code>git push --force</code>)?", options: ["A push with more bandwidth", "A push that overwrites remote history — dangerous on shared branches because it discards commits others may have built on", "A push that ignores network errors", "A push that skips pre-push hooks"], answer: 1 },
      { q: "What is the safer alternative to <code>git push --force</code>?", options: ["git push --hard", "git push --force-with-lease (only force pushes if no one else has pushed)", "git push --safe", "git push --overwrite"], answer: 1 },
      { q: "What does SSH key authentication replace when pushing to GitHub?", options: ["The need for a local .git folder", "Username/password authentication — the private key proves your identity without a password each time", "The need to configure remotes", "Git's signing mechanism"], answer: 1 },
      { q: "What are the two parts of an SSH key pair?", options: ["Username and password", "Public key (shared with GitHub) and private key (kept secret on your machine)", "Session key and master key", "Symmetric key and asymmetric key"], answer: 1 },
      { q: "Where do you add your SSH public key on GitHub?", options: ["In your repository settings", "In GitHub Settings → SSH and GPG keys → New SSH key", "In your .gitconfig file", "In the repository's .github folder"], answer: 1 },
      { q: "What does <code>git clone --depth 1 &lt;url&gt;</code> create?", options: ["A clone with no history", "A shallow clone with only the latest commit — useful for CI or when full history is not needed", "A read-only clone", "A clone of only the main branch"], answer: 1 },
      { q: "What does <code>git remote rename origin upstream</code> do?", options: ["Deletes the origin remote", "Creates a new remote called upstream", "Renames the remote \"origin\" to \"upstream\"", "Points upstream to the origin URL"], answer: 2 },
      { q: "How do you delete a remote branch from GitHub via the command line?", options: ["git branch -d origin/branch", "git remote delete origin branch", "git push origin --delete branch-name", "git remove origin/branch"], answer: 2 }
    ]
  };
