  <script>
  window.QUIZ_DATA = {
    title: "Git Basics Quiz",
    questions: [
      { q: "Which command initializes a new Git repository in the current directory?", options: ["git start", "git create", "git init", "git new"], answer: 2 },
      { q: "What does <code>git init</code> create in the directory?", options: ["A remote connection", "A .git folder containing the Git repository metadata", "A first commit", "A README.md file"], answer: 1 },
      { q: "What does <code>git clone &lt;url&gt;</code> do?", options: ["Creates a new empty repository", "Downloads a copy of an existing remote repository, including all history", "Pushes local files to a server", "Creates a new branch"], answer: 1 },
      { q: "What does <code>git add .</code> do?", options: ["Commits all changes", "Stages all modified and new files in the current directory and subdirectories", "Pushes all files to remote", "Creates a new commit"], answer: 1 },
      { q: "What is the purpose of <code>git add</code>?", options: ["To delete files from the repository", "To move files to the staging area (index) in preparation for a commit", "To push changes to remote", "To create a new branch"], answer: 1 },
      { q: "Which command creates a commit with a message?", options: ["git save -m \"message\"", "git push -m \"message\"", "git commit -m \"message\"", "git store -m \"message\""], answer: 2 },
      { q: "What does a good commit message convey?", options: ["The date of the change", "The file names changed", "WHY the change was made (not just what changed — the diff already shows that)", "The author's name"], answer: 2 },
      { q: "What does <code>git status</code> show?", options: ["The diff of all changes", "Which files are staged, unstaged, or untracked relative to the last commit", "The commit log", "The remote URL"], answer: 1 },
      { q: "What does <code>git log --oneline</code> show?", options: ["Only the last commit", "A compact one-line-per-commit view of the history (short hash + message)", "All files changed", "The diff of each commit"], answer: 1 },
      { q: "What does <code>git diff</code> (with no arguments) show?", options: ["Diff between HEAD and the last remote push", "Diff between staged changes and the last commit", "Diff between the working directory and the staging area (unstaged changes)", "Diff between two branches"], answer: 2 },
      { q: "What does <code>git diff --staged</code> show?", options: ["Changes not yet staged", "Changes between working directory and HEAD", "Changes that are staged (in the index) compared to the last commit", "Changes on remote"], answer: 2 },
      { q: "How do you undo changes to a file in the working directory (discard local edits)?", options: ["git undo file.txt", "git restore file.txt (or git checkout -- file.txt)", "git reset file.txt", "git revert file.txt"], answer: 1 },
      { q: "What does <code>git restore --staged &lt;file&gt;</code> do?", options: ["Deletes the file", "Commits the file", "Unstages the file — removes it from the staging area while keeping working directory changes", "Reverts the file to its last committed state"], answer: 2 },
      { q: "What does <code>git commit --amend</code> do?", options: ["Creates a new commit on top of the last one", "Modifies the most recent commit — lets you change its message or add/remove staged changes", "Undoes the last commit", "Pushes the commit to remote"], answer: 1 },
      { q: "When should you avoid using <code>git commit --amend</code>?", options: ["When the commit message is wrong", "When you forgot to stage a file", "When the commit has already been pushed to a shared remote branch", "When working on a local branch"], answer: 2 },
      { q: "What does <code>git reset HEAD~1</code> do by default (--mixed)?", options: ["Deletes the last commit and all its changes permanently", "Undoes the last commit, unstages its changes, but keeps them in the working directory", "Moves the last commit to a new branch", "Pushes the last commit to remote"], answer: 1 },
      { q: "What does <code>git reset --hard HEAD~1</code> do?", options: ["Undoes the last commit but keeps changes staged", "Undoes the last commit and discards all changes permanently — working directory is reset", "Creates a new branch at HEAD~1", "Merges HEAD~1 into HEAD"], answer: 1 },
      { q: "What does <code>git revert &lt;commit-hash&gt;</code> do?", options: ["Deletes the commit from history", "Creates a new commit that undoes the changes from the specified commit — history is preserved", "Resets HEAD to that commit", "Merges the commit into the current branch"], answer: 1 },
      { q: "What is the key difference between <code>git reset</code> and <code>git revert</code>?", options: ["They are identical", "reset rewrites history (unsafe on shared branches); revert creates a new undo commit (safe for shared branches)", "revert is faster", "reset works on files; revert works on commits"], answer: 1 },
      { q: "What does <code>git log --graph --oneline --all</code> show?", options: ["A list of all files", "A visual ASCII graph of all branch history", "The diff of all commits", "The remote commits only"], answer: 1 },
      { q: "What does <code>git show &lt;commit-hash&gt;</code> display?", options: ["All files in the commit", "The commit metadata (author, date, message) plus the diff of changes introduced by that commit", "The branch name", "The remote URL"], answer: 1 },
      { q: "Which flag with <code>git add</code> interactively lets you stage specific chunks (hunks) of a file?", options: ["git add --chunk", "git add -p (or --patch)", "git add --interactive", "git add --hunk"], answer: 1 },
      { q: "What does the short status output <code>M</code> in <code>git status -s</code> mean?", options: ["Merged", "Marked for deletion", "Modified", "Moved"], answer: 2 },
      { q: "What does <code>git log -n 5</code> show?", options: ["The last 5 files committed", "The 5 most recent commits", "Commits from the last 5 days", "The 5 largest commits"], answer: 1 },
      { q: "How does <code>git clone</code> set up tracking by default?", options: ["It does not set up tracking", "The default branch is set to track origin/main (or origin/master)", "You must manually set up tracking after clone", "It tracks all remote branches"], answer: 1 }
    ]
  };
