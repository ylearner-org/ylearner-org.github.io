  <script>
  window.QUIZ_DATA = {
    title: "Git Workflows Quiz",
    questions: [
      { q: "What is the Git Flow branching strategy?", options: ["A workflow where everyone commits directly to main", "A structured workflow using main, develop, feature/*, release/*, and hotfix/* branches to manage releases", "A workflow with only one long-lived branch", "A workflow that requires rebasing all branches onto main daily"], answer: 1 },
      { q: "In Git Flow, which branch contains production-ready code?", options: ["develop", "feature", "release", "main (or master)"], answer: 3 },
      { q: "In Git Flow, where does ongoing development happen?", options: ["main", "develop — features are merged here and it is merged into main for releases", "feature/* branches directly", "release branches"], answer: 1 },
      { q: "What is a hotfix branch in Git Flow?", options: ["A branch for large features", "A branch created from main to quickly fix a critical production bug and merged back to both main and develop", "A branch for testing releases", "A branch that is never merged"], answer: 1 },
      { q: "What is the Feature Branch Workflow?", options: ["All changes go directly to main", "Each new feature is developed in its own branch, then merged via a pull request after code review", "Features are built in the develop branch only", "A workflow that requires rebasing all feature branches daily"], answer: 1 },
      { q: "What is the main advantage of the Feature Branch Workflow over committing directly to main?", options: ["It is faster", "Isolates work in progress, enables code review via PRs, and prevents broken code from reaching main", "It requires fewer commits", "It avoids the need for remote repositories"], answer: 1 },
      { q: "What is Trunk-Based Development?", options: ["A workflow with many long-lived branches", "A workflow where developers commit small, frequent changes directly to a single main branch (trunk), often using feature flags", "A workflow requiring Git Flow", "A workflow for single-developer projects only"], answer: 1 },
      { q: "What is the Conventional Commits specification?", options: ["A Git command for formatting commits", "A standard format for commit messages: type(scope): description — enabling automated changelogs and semantic versioning", "A tool to squash commits automatically", "A GitHub webhook for commit validation"], answer: 1 },
      { q: "In Conventional Commits, what does the <code>feat</code> type indicate?", options: ["A bug fix", "A new feature (triggers a MINOR version bump in semver)", "A documentation change", "A breaking change"], answer: 1 },
      { q: "In Conventional Commits, what does the <code>fix</code> type indicate?", options: ["A new feature", "A breaking change", "A bug fix (triggers a PATCH version bump in semver)", "A refactor"], answer: 2 },
      { q: "How do you indicate a BREAKING CHANGE in Conventional Commits?", options: ["Use the type \"breaking\"", "Add ! after the type (e.g., feat!:) or add a BREAKING CHANGE footer in the commit body", "Use all caps in the commit message", "Add the --breaking flag to git commit"], answer: 1 },
      { q: "What does a <code>.gitignore</code> file do?", options: ["Deletes files from the repository", "Specifies files and patterns that Git should NOT track or show as untracked", "Lists all tracked files", "Configures Git settings for the repo"], answer: 1 },
      { q: "Which pattern in <code>.gitignore</code> ignores all <code>.log</code> files?", options: ["log.*", "*.log", "**log", "all:.log"], answer: 1 },
      { q: "Which pattern ignores the <code>node_modules</code> directory anywhere in the project?", options: ["node_modules", "**/node_modules", "node_modules/**", "node_modules/"], answer: 1 },
      { q: "If a file is already tracked by Git, does adding it to <code>.gitignore</code> stop Git from tracking it?", options: ["Yes, immediately", "No — you must run git rm --cached &lt;file&gt; to stop tracking it, THEN gitignore takes effect", "Yes, on the next commit", "No, gitignore only affects new repositories"], answer: 1 },
      { q: "What does a leading <code>/</code> in a <code>.gitignore</code> pattern do?", options: ["Matches the pattern anywhere in the project", "Anchors the pattern to the root of the repository — only matches at the root, not in subdirectories", "Makes the pattern recursive", "Ignores the directory permanently"], answer: 1 },
      { q: "What does a trailing <code>/</code> in a <code>.gitignore</code> pattern match?", options: ["Files only", "Directories only", "Both files and directories", "Nothing special — / is ignored"], answer: 1 },
      { q: "How do you track a file that matches a <code>.gitignore</code> pattern?", options: ["Remove the pattern from .gitignore", "Use git add --ignore .gitignore", "git add -f &lt;filename&gt; (force add)", "You cannot track a gitignored file"], answer: 2 },
      { q: "What is a <code>.gitattributes</code> file used for?", options: ["Setting file permissions", "Configuring per-file or per-path attributes like line endings (eol), diff drivers, and merge strategies", "Listing repository collaborators", "Defining webhook URLs"], answer: 1 },
      { q: "Why is managing line endings with <code>.gitattributes</code> important?", options: ["It is only for Windows users", "It ensures consistent line endings across different OS environments — prevents unnecessary diffs when Windows (CRLF) and Unix (LF) developers collaborate", "It only affects binary files", "It determines the default editor"], answer: 1 },
      { q: "What does a global <code>.gitignore</code> file (configured with <code>core.excludesFile</code>) do?", options: ["Ignores files only in the current repository", "Applies ignore rules across ALL repositories for the current user — useful for OS-specific files like .DS_Store or Thumbs.db", "Overrides project-level .gitignore", "Only works on private repositories"], answer: 1 },
      { q: "In a team using the Feature Branch Workflow, what typically triggers a CI pipeline?", options: ["Every git add", "Opening a pull request and/or pushing to a feature branch", "Closing a pull request", "Deleting a branch"], answer: 1 },
      { q: "What is the purpose of code review in a PR workflow?", options: ["To automatically merge code", "To have another developer review changes for correctness, quality, security, and knowledge sharing before merging", "To run tests automatically", "To generate commit messages"], answer: 1 },
      { q: "What does squashing commits before merging a PR accomplish?", options: ["Nothing — it is just a preference", "Creates one clean commit on main per feature, making the main branch history easier to read", "Prevents CI from running", "Automatically closes related issues"], answer: 1 },
      { q: "What is semantic versioning (semver) and how does it relate to Conventional Commits?", options: ["A naming convention for branches", "A version format (MAJOR.MINOR.PATCH) where Conventional Commits types map to version bumps — feat→MINOR, fix→PATCH, BREAKING CHANGE→MAJOR", "A commit signing protocol", "A release workflow for hotfixes"], answer: 1 }
    ]
  };
