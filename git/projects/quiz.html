  <script>
  window.QUIZ_DATA = {
    title: "Git Projects Quiz",
    questions: [
      { q: "What is the first step to version control an existing project with Git?", options: ["Create a GitHub repository", "Run git init inside the project directory to initialize a local repository", "Run git clone on the project folder", "Add a .git file manually"], answer: 1 },
      { q: "What should you typically add to <code>.gitignore</code> when starting a Node.js project?", options: ["src/ and index.js", "node_modules/, dist/, .env, and build output directories", "package.json and package-lock.json", "All JavaScript files"], answer: 1 },
      { q: "What is a good initial commit message for a new project?", options: ["first", "stuff", "Initial commit or chore: initialize repository", "Done"], answer: 2 },
      { q: "Which branching model is best for a small team with continuous delivery?", options: ["Git Flow with strict develop and release branches", "Trunk-based development or a simple feature branch workflow with short-lived branches", "No branching — commit directly to main", "A single develop branch with no main"], answer: 1 },
      { q: "What does \"branching strategy\" mean for a team?", options: ["Which branch to delete first", "The agreed rules for how branches are created, named, merged, and deleted across the team", "The number of branches allowed", "Whether to use Git or GitHub"], answer: 1 },
      { q: "What is a good branch naming convention for a feature?", options: ["my-branch", "temp", "feature/user-authentication or feat/login-page", "branch1"], answer: 2 },
      { q: "In a team workflow, what is the purpose of a pull request review checklist?", options: ["A legal document", "A list of items (correctness, tests, security, style) that reviewers check before approving and merging the PR", "A list of failing tests", "A deployment runbook"], answer: 1 },
      { q: "What should a PR description include?", options: ["Only the commit hashes", "What the change does, why it was made, how to test it, and links to related issues", "Only the file names changed", "The reviewer's name and deadline"], answer: 1 },
      { q: "What is continuous integration (CI) in the context of a Git workflow?", options: ["Manually running tests before each commit", "Automatically running builds and tests on each push or PR — tools like GitHub Actions, GitLab CI, or Jenkins do this", "A branching strategy", "A way to continuously integrate team members"], answer: 1 },
      { q: "How should sensitive data like API keys be handled in a Git repository?", options: ["Commit them to a private repository only", "Store them in environment variables or secrets managers; add .env to .gitignore — never commit secrets to Git", "Encrypt them in the codebase", "Store in a comments block at the top of main.py"], answer: 1 },
      { q: "What happens if you accidentally commit a secret (API key, password)?", options: ["Nothing — only push exposes it", "Rotate the secret immediately, then remove it from history using git filter-repo or BFG Repo Cleaner — treating it as compromised", "Use git rm to remove it from the latest commit", "Only remove it from .gitignore"], answer: 1 },
      { q: "What is the fork and pull request model for open source contribution?", options: ["Email patches to the maintainer", "Fork the repository, clone your fork, make changes on a branch, push to your fork, then open a PR to the upstream repository", "Clone the original repo, commit to main, push directly", "Create a branch on the original repo directly"], answer: 1 },
      { q: "What is the first thing you should do before starting work on an open source issue?", options: ["Start coding immediately", "Read the CONTRIBUTING.md file, comment on the issue to say you're working on it, and ensure no one else is already working on it", "Fork the repository", "Create a pull request"], answer: 1 },
      { q: "What does CONTRIBUTING.md typically contain?", options: ["The project changelog", "Guidelines for contributing — code style, commit conventions, PR process, development setup, and code of conduct reference", "The project license", "The list of all contributors"], answer: 1 },
      { q: "After your open source PR is merged, what should you do to keep your fork up to date?", options: ["Delete and re-fork the repository", "Sync your fork: fetch from upstream, merge upstream/main into your local main, push to your origin fork", "Nothing — forks auto-update", "Run git pull from the original repository directly"], answer: 1 },
      { q: "What is a good commit size (granularity)?", options: ["One commit per hour", "One massive commit at the end of the feature", "Each commit should be atomic — one logical change that passes tests and can be understood in isolation", "At least 100 file changes per commit"], answer: 2 },
      { q: "What is \"commit early, commit often\" advice?", options: ["Push to main after every keystroke", "Make frequent, small commits to save progress and make history easier to understand and bisect", "Only commit when the entire feature is done", "Commit every 24 hours"], answer: 1 },
      { q: "What is a protected branch?", options: ["A branch with encrypted commits", "A branch with rules preventing direct pushes — requires PRs and passing CI checks before merging (e.g., main is often protected)", "A read-only clone", "A branch with a password"], answer: 1 },
      { q: "What does CODEOWNERS file in a GitHub repository do?", options: ["Lists all contributors", "Assigns automatic PR reviewers based on which files changed — owners must approve PRs touching their files", "Restricts who can clone the repo", "Sets branch protection rules"], answer: 1 },
      { q: "What is a \"stale branch\" and what should you do with it?", options: ["A branch with old commits that is no longer being worked on — should be deleted after its PR is merged to keep the repository clean", "A branch with a bad commit message", "A branch that cannot be merged", "A branch with no commits"], answer: 0 },
      { q: "How do you simulate team collaboration as a solo developer?", options: ["It is impossible", "Work across multiple branches (feature branches, a develop branch, main) and practice PRs with draft PRs or a second GitHub account", "Ask friends to contribute", "Use a different version control system"], answer: 1 },
      { q: "What does <code>git log --follow -- path/to/file.txt</code> do?", options: ["Shows changes to the file in the last commit only", "Shows the full commit history of a file, even across file renames", "Follows symlinks", "Lists all authors of the file"], answer: 1 },
      { q: "What is the purpose of tagging a release (e.g., v1.0.0) in a project?", options: ["To protect the commit from deletion", "To mark a specific commit as a named release version — makes it easy to reference, download, and generate release notes", "To prevent future commits on main", "To create a deployment automatically"], answer: 1 },
      { q: "What is a \"good first issue\" label on GitHub?", options: ["An issue that was filed correctly", "Issues marked by maintainers as suitable for first-time contributors — typically well-scoped with enough context to get started", "An issue with no bug", "An automatically generated issue"], answer: 1 },
      { q: "What should you do if you get merge conflicts when syncing your fork with upstream?", options: ["Delete your fork and re-fork", "Resolve the conflicts locally: fetch upstream, merge/rebase onto upstream/main, resolve conflicts, commit, then push to your fork", "Open a new issue on upstream", "Ask the maintainer to resolve them"], answer: 1 }
    ]
  };
