  <script>
  window.QUIZ_DATA = {
    title: "Advanced Git Quiz",
    questions: [
      { q: "What does <code>git stash</code> do?", options: ["Commits all staged changes", "Saves uncommitted changes (staged and unstaged) to a temporary stack and reverts the working directory to HEAD", "Pushes changes to a remote stash server", "Deletes all uncommitted changes"], answer: 1 },
      { q: "When is <code>git stash</code> useful?", options: ["When you want to delete work in progress", "When you need to switch branches quickly without committing half-done work", "When you need to push to remote", "When you want to squash commits"], answer: 1 },
      { q: "Which command applies the most recent stash and removes it from the stash list?", options: ["git stash get", "git stash apply", "git stash pop", "git stash restore"], answer: 2 },
      { q: "What is the difference between <code>git stash apply</code> and <code>git stash pop</code>?", options: ["They are identical", "apply applies the stash but keeps it in the stash list; pop applies AND removes it from the list", "pop applies only staged changes; apply applies all", "apply requires a stash index; pop does not"], answer: 1 },
      { q: "Which command shows all stashed changes?", options: ["git stash show", "git stash log", "git stash list", "git stash status"], answer: 2 },
      { q: "What is a Git tag?", options: ["A branch that cannot be deleted", "A reference that marks a specific commit — typically used to mark release versions (v1.0, v2.3)", "A comment on a commit", "A remote tracking reference"], answer: 1 },
      { q: "What is the difference between a lightweight tag and an annotated tag?", options: ["Lightweight tags cannot be pushed; annotated can", "A lightweight tag is just a pointer to a commit; an annotated tag is a full Git object with tagger info, date, message, and optional GPG signature", "Annotated tags point to commits; lightweight tags point to branches", "There is no difference"], answer: 1 },
      { q: "Which command creates an annotated tag?", options: ["git tag v1.0", "git tag --annotated v1.0", "git tag -a v1.0 -m \"Version 1.0\"", "git release v1.0"], answer: 2 },
      { q: "How do you push tags to a remote?", options: ["Tags are pushed automatically with git push", "git push origin --tags (or git push origin v1.0 for a specific tag)", "git push --with-tags", "git tag --push"], answer: 1 },
      { q: "What does <code>git cherry-pick &lt;commit-hash&gt;</code> do?", options: ["Reverts a specific commit", "Applies the changes from a specific commit to the current branch as a new commit", "Moves a commit from one branch to another (removing it from the source)", "Creates a tag on the specified commit"], answer: 1 },
      { q: "What is a common use case for cherry-pick?", options: ["Merging entire feature branches", "Applying a specific bug fix from one branch (e.g., develop) to another (e.g., a hotfix or release branch) without merging everything", "Squashing commits", "Rebasing the entire branch"], answer: 1 },
      { q: "What is the potential downside of cherry-picking?", options: ["It is slow", "It can create duplicate commits if the original commit is later merged, leading to conflicts or duplicate changes", "It requires admin access", "It deletes the original commit"], answer: 1 },
      { q: "What is <code>git bisect</code> used for?", options: ["Splitting a commit into two", "Using binary search through commit history to find the commit that introduced a bug", "Comparing two branches", "Splitting a large repository"], answer: 1 },
      { q: "What is the workflow for <code>git bisect</code>?", options: ["git bisect run --auto", "Start with git bisect start, mark a known-good commit (git bisect good) and a known-bad commit (git bisect bad), then test each Git-provided commit", "git bisect --find-bug", "git bisect compare good bad"], answer: 1 },
      { q: "What does <code>git blame &lt;file&gt;</code> show?", options: ["Who deleted the file", "Line-by-line annotation showing which commit and author last modified each line of the file", "A list of bugs in the file", "The commit history of the entire repository"], answer: 1 },
      { q: "What are Git hooks?", options: ["Commands to link two repositories", "Scripts that run automatically in response to specific Git events (commit, push, merge, etc.)", "A way to hook into GitHub's API", "Shortcuts for common Git commands"], answer: 1 },
      { q: "Where are local Git hooks stored?", options: ["In the project root", "In .git/hooks/ directory", "In ~/.git/hooks/", "In .github/hooks/"], answer: 1 },
      { q: "What is a <code>pre-commit</code> hook used for?", options: ["Running code after a commit is made", "Running checks (linting, tests, formatting) BEFORE a commit is allowed to complete — the commit is blocked if the hook exits non-zero", "Formatting commit messages", "Sending commit notifications"], answer: 1 },
      { q: "What is a <code>commit-msg</code> hook used for?", options: ["Automatically generating commit messages", "Validating that the commit message meets the project's format requirements (e.g., conventional commits)", "Adding a signature to commits", "Running tests after commit"], answer: 1 },
      { q: "What is a <code>pre-push</code> hook useful for?", options: ["Blocking push to remote if tests fail", "Running the test suite or other checks before allowing a push to proceed", "Formatting code before push", "Generating changelogs"], answer: 0 },
      { q: "Are hooks tracked by default in a Git repository?", options: ["Yes, hooks in .git/hooks are committed", "No — .git/ is not tracked, so hooks are local-only. Tools like Husky or scripts copy hooks to .git/hooks after clone.", "Yes, if you add them to .gitignore", "Only server-side hooks are tracked"], answer: 1 },
      { q: "What does <code>git stash branch &lt;branch-name&gt;</code> do?", options: ["Creates a branch from the current stash and applies it, then drops the stash", "Pushes a stash to a branch on remote", "Stashes only branch-related changes", "Renames the stash"], answer: 0 },
      { q: "What does <code>git tag -d v1.0</code> do?", options: ["Deletes the tag locally", "Pushes the deletion to remote", "Renames the tag", "Creates a new tag"], answer: 0 },
      { q: "What does <code>git reflog</code> show?", options: ["The remote commit log", "A log of all HEAD movements (commits, checkouts, resets, merges) — useful for recovering \"lost\" commits after a reset", "The diff of all recent changes", "All stash entries"], answer: 1 },
      { q: "How can you recover a commit that was removed with <code>git reset --hard</code>?", options: ["It is permanently lost", "Use git reflog to find the commit hash, then git checkout or git reset to restore it", "Use git restore --hard", "Use git recover"], answer: 1 }
    ]
  };
