  <script>
  window.QUIZ_DATA = {
    title: "Git Introduction Quiz",
    questions: [
      { q: "What is a version control system (VCS)?", options: ["A tool that compresses code files", "A system that tracks changes to files over time, enabling history review and collaboration", "A code editor plugin", "A deployment tool"], answer: 1 },
      { q: "What type of VCS is Git?", options: ["Centralized — all history lives on one server", "Distributed — every developer has a full copy of the repository including all history", "Cloud-based — history is stored only in the cloud", "Incremental — only the latest snapshot is stored"], answer: 1 },
      { q: "What is the main advantage of a distributed VCS over a centralized VCS?", options: ["Distributed VCS is always faster", "Every developer has a full copy of history, enabling offline work and no single point of failure", "Distributed VCS requires less disk space", "Distributed VCS automatically resolves merge conflicts"], answer: 1 },
      { q: "How does Git store data internally?", options: ["As file diffs (line-by-line changes)", "As a series of patches", "As snapshots of the entire project state at each commit", "As compressed file archives"], answer: 2 },
      { q: "What are the three main areas in Git's working model?", options: ["Local, Remote, Cloud", "Working Directory, Staging Area (Index), Repository (.git folder)", "Source, Build, Deploy", "Draft, Review, Published"], answer: 1 },
      { q: "What is the Staging Area (Index) in Git?", options: ["The remote repository", "A temporary area where you prepare changes before committing them", "The commit history", "The branch list"], answer: 1 },
      { q: "What is HEAD in Git?", options: ["The first commit ever made", "A pointer to the current branch (which points to the latest commit on that branch)", "The remote tracking branch", "The staging area"], answer: 1 },
      { q: "What does the <code>.git</code> directory contain?", options: ["Your source code files", "The entire Git repository — objects, refs, config, and history", "Only the latest commit", "Temporary merge files"], answer: 1 },
      { q: "What is a Git commit?", options: ["A request to merge code into main", "A snapshot of the staged changes at a point in time, with metadata (author, message, timestamp, parent commit)", "A push to a remote server", "A branch creation"], answer: 1 },
      { q: "What is the difference between Git and GitHub?", options: ["They are the same thing", "Git is the version control system; GitHub is a cloud hosting platform for Git repositories with collaboration features", "GitHub is the open-source tool; Git is GitHub's paid version", "Git is for code; GitHub is for documentation"], answer: 1 },
      { q: "Which command configures your Git username globally?", options: ["git set username \"Your Name\"", "git config user.name \"Your Name\"", "git config --global user.name \"Your Name\"", "git setup --name \"Your Name\""], answer: 2 },
      { q: "What does <code>git config --global</code> affect?", options: ["Only the current repository", "All repositories for the current user on the machine", "All users on the machine", "Only the remote repository"], answer: 1 },
      { q: "What is a repository in Git?", options: ["A directory without Git tracking", "A directory tracked by Git, containing the .git folder with all history and metadata", "A remote server", "A branch"], answer: 1 },
      { q: "What is a commit hash (SHA)?", options: ["A human-readable commit message", "A 40-character hexadecimal identifier that uniquely identifies each commit", "The branch name", "The commit number in sequence"], answer: 1 },
      { q: "What does \"untracked\" mean for a file in Git?", options: ["The file has staged changes", "The file is tracked but unchanged", "The file is not yet known to Git — it has never been staged or committed", "The file is ignored by .gitignore"], answer: 2 },
      { q: "What is the purpose of <code>git config --global core.editor</code>?", options: ["Sets the default programming language", "Sets the text editor Git uses for commit messages and other editing tasks", "Sets the default branch name", "Configures syntax highlighting"], answer: 1 },
      { q: "In Git's object model, which object type stores the content of a file?", options: ["commit", "tree", "blob", "ref"], answer: 2 },
      { q: "What is a \"detached HEAD\" state?", options: ["A corrupted repository", "HEAD points directly to a commit rather than to a branch — new commits won't belong to any branch", "The repository has no commits", "The HEAD pointer is deleted"], answer: 1 },
      { q: "What does it mean that Git is \"content-addressed\"?", options: ["Files are sorted by content type", "Objects are identified by their content hash — the same content always has the same SHA", "Git requires content to be plain text", "Files are stored sorted alphabetically"], answer: 1 },
      { q: "Which of these is an example of a centralized version control system?", options: ["Git", "Mercurial", "SVN (Subversion)", "Bazaar"], answer: 2 },
      { q: "What does <code>git log</code> show?", options: ["Only the latest commit", "The commit history of the current branch — hash, author, date, message", "The diff of the last commit", "The list of tracked files"], answer: 1 },
      { q: "What is a \"working directory\" in Git?", options: ["The .git folder", "The remote repository", "The directory where you edit your files — the checked-out version of the project", "The staging area"], answer: 2 },
      { q: "What happens when you make a commit in Git?", options: ["Changes are pushed to the remote immediately", "A new snapshot is created in the local repository with a unique SHA, parent pointer, and your staged changes", "The staging area is deleted", "A new branch is created"], answer: 1 },
      { q: "What is a \"ref\" in Git?", options: ["A reference to a remote repository", "A human-readable name (like a branch or tag name) that points to a commit SHA", "A type of merge", "A configuration setting"], answer: 1 },
      { q: "What does <code>git config --list</code> show?", options: ["All branches in the repo", "All configuration settings Git is currently using (system, global, and local combined)", "The commit log", "All remote URLs"], answer: 1 }
    ]
