  <script>
  window.QUIZ_DATA = {
    title: "Git Branching & Merging Quiz",
    questions: [
      { q: "What is a Git branch?", options: ["A copy of the entire repository", "A lightweight movable pointer to a specific commit", "A backup of the main branch", "A tag on a commit"], answer: 1 },
      { q: "Why are Git branches considered \"cheap\"?", options: ["They delete automatically after use", "They only store a pointer to a commit (40 bytes), not a full copy of the codebase", "They compress all files", "They share storage with other branches"], answer: 1 },
      { q: "Which command creates a new branch called \"feature/login\"?", options: ["git new feature/login", "git branch feature/login", "git create feature/login", "git checkout feature/login"], answer: 1 },
      { q: "Which command creates AND switches to a new branch in one step?", options: ["git branch -s feature/login", "git checkout -b feature/login (or git switch -c feature/login)", "git new --switch feature/login", "git branch --move feature/login"], answer: 1 },
      { q: "What does <code>git switch main</code> do?", options: ["Creates a new branch called main", "Merges the current branch into main", "Switches the working directory to the main branch", "Deletes the current branch and moves to main"], answer: 2 },
      { q: "What is a fast-forward merge?", options: ["A merge that always creates a merge commit", "A merge where the target branch has not diverged — Git simply moves the pointer forward to the source branch tip", "A merge that skips commit history", "A merge that always causes conflicts"], answer: 1 },
      { q: "When does a fast-forward merge NOT happen?", options: ["When both branches have the same commits", "When the base branch has new commits that the feature branch does not have (branches have diverged)", "When using --no-ff flag", "Both B and C"], answer: 3 },
      { q: "What does a 3-way merge produce?", options: ["Three separate files", "A new merge commit that combines changes from two diverged branches plus their common ancestor", "A rebase of both branches", "A fast-forward of both branches"], answer: 1 },
      { q: "What does <code>git merge feature/login</code> do when run on the main branch?", options: ["Deletes the feature/login branch", "Merges the changes from feature/login into the current (main) branch", "Pushes feature/login to remote", "Rebases main onto feature/login"], answer: 1 },
      { q: "What causes a merge conflict?", options: ["A branch being too large", "Two branches modifying the same lines of the same file in different ways", "A slow network connection", "Using an old version of Git"], answer: 1 },
      { q: "What do conflict markers look like in a file?", options: ["<<< >>> and === symbols delimiting each branch's version of the conflicting section", "CONFLICT: and RESOLVED: labels", "[HEAD] and [BRANCH] labels", "A separate conflict file is created"], answer: 0 },
      { q: "After manually resolving a merge conflict, what is the next step?", options: ["Run git revert", "Run git merge --abort", "Stage the resolved files with git add, then git commit to complete the merge", "Run git reset --hard"], answer: 2 },
      { q: "What does <code>git merge --abort</code> do?", options: ["Completes the merge ignoring conflicts", "Deletes the branch being merged", "Stops the in-progress merge and restores the pre-merge state", "Creates a backup commit before aborting"], answer: 2 },
      { q: "What does <code>git merge --no-ff feature</code> do?", options: ["Forces a fast-forward even when branches diverged", "Prevents fast-forward — always creates a merge commit, preserving branch history", "Cancels the merge", "Merges without checking for conflicts"], answer: 1 },
      { q: "What is rebasing in Git?", options: ["Moving the repository to a new server", "Replaying commits from one branch on top of another, creating a linear history", "Creating a new branch from a commit", "Squashing all commits into one"], answer: 1 },
      { q: "What is the main benefit of rebasing over merging?", options: ["Rebase is always faster", "Rebase produces a clean, linear commit history without merge commits", "Rebase never causes conflicts", "Rebase preserves the exact original commit dates"], answer: 1 },
      { q: "What is the golden rule of rebasing?", options: ["Always rebase before merging", "Never rebase commits that have already been pushed to a shared branch — it rewrites history and causes problems for other developers", "Always rebase onto main", "Rebase is safe in all cases"], answer: 1 },
      { q: "What does <code>git rebase main</code> do when run on a feature branch?", options: ["Merges main into the feature branch", "Replays the feature branch's commits on top of the latest main commit, making the feature branch appear to have started from current main", "Pushes the feature branch to main", "Deletes commits from main"], answer: 1 },
      { q: "What is an interactive rebase used for?", options: ["Rebasing with a GUI", "Rewriting history — squashing, reordering, editing, or dropping commits before sharing with others", "Resolving conflicts automatically", "Pulling from a remote"], answer: 1 },
      { q: "Which command starts an interactive rebase of the last 3 commits?", options: ["git rebase -i HEAD~3", "git rebase --edit 3", "git interactive HEAD-3", "git squash 3"], answer: 0 },
      { q: "What does \"squash\" do in an interactive rebase?", options: ["Deletes the commit completely", "Combines the commit with the previous commit into a single commit", "Moves the commit to a different branch", "Edits the commit message only"], answer: 1 },
      { q: "What does <code>git branch -d feature/login</code> do?", options: ["Creates a new branch", "Renames the branch", "Deletes the feature/login branch (only if it has been merged)", "Forces deletion regardless of merge status"], answer: 2 },
      { q: "What is the difference between <code>git branch -d</code> and <code>git branch -D</code>?", options: ["They are identical", "-d deletes only merged branches; -D force-deletes regardless of merge status", "-D is deprecated", "-d deletes remote branches; -D deletes local branches"], answer: 1 },
      { q: "What does <code>git log main..feature</code> show?", options: ["Commits on main not in feature", "Commits on feature not in main (commits that will be merged)", "All commits on both branches", "The diff between main and feature"], answer: 1 },
      { q: "What is the purpose of <code>git cherry-pick &lt;hash&gt;</code>?", options: ["Randomly selects a commit to revert", "Applies a specific commit from another branch to the current branch", "Merges an entire branch", "Creates a tag on a specific commit"], answer: 1 }
    ]
  };
