      { q: "Difference between <code>id</code> and <code>class</code>?", options: ["id for styling, class for JS", "id must be unique per page, class can repeat", "id is faster, class is slower", "No difference"], answer: 1 },
      { q: "What does <code>defer</code> on a script tag do?", options: ["Runs script immediately", "Runs after DOM is parsed without blocking", "Runs after all resources load", "Prevents script from running"], answer: 1 },
      { q: "What does <code>async</code> on a script tag do?", options: ["Runs synchronously", "Downloads and runs immediately when ready, may block", "Waits for DOM", "Delays 1 second"], answer: 1 },
      { q: "What are data attributes used for?", options: ["CSS variables", "Storing custom data on HTML elements", "Meta information", "ARIA labels"], answer: 1 },
      { q: "Which attribute improves image accessibility most?", options: ["title", "class", "alt", "src"], answer: 2 },
      { q: '<code>tabindex="0"</code> does what?', options: ["Removes from tab order", "Adds to natural tab order", "Makes first in tab order", "Disables tab"], answer: 1 },
      { q: '<code>tabindex="-1"</code> does what?', options: ["Adds to tab order", "Removes from tab but focusable via JS", "Prevents all focus", "Disables element"], answer: 1 },
      { q: "Which meta tag is most important for mobile responsiveness?", options: ['charset="UTF-8"', 'name="viewport" content="width=device-width"', 'name="mobile-web-app-capable"', 'http-equiv="X-UA-Compatible"'], answer: 1 },
      { q: "What is the <code>&lt;template&gt;</code> element?", options: ["Renders HTML on load", "Holds inert HTML for later JS use", "A CSS grid template", "A server-side include"], answer: 1 },
      { q: "What does <code>srcset</code> on <code>&lt;img&gt;</code> do?", options: ["Sets source type", "Provides multiple image sources for different screen sizes", "Loads images lazily", "Sets fallback src"], answer: 1 },
      { q: "What is progressive enhancement?", options: ["CSS animation", "Starting with basic HTML then adding CSS/JS layers", "Loading pages progressively", "Mobile-first CSS"], answer: 1 },
      { q: "Where should <code>&lt;link rel='stylesheet'&gt;</code> be placed?", options: ["Before &lt;/body&gt;", "At end of &lt;body&gt;", "In &lt;head&gt;", "After &lt;main&gt;"], answer: 2 },
      { q: "What is the <code>&lt;base&gt;</code> element?", options: ["Base64 encoding", "Sets default URL for relative links", "Base CSS", "First element in body"], answer: 1 },
      { q: 'What does <code>loading="lazy"</code> on <code>&lt;img&gt;</code> do?', options: ["Loads in background", "Defers loading until near viewport", "Compresses image", "Caches image"], answer: 1 },
      { q: "<code>&lt;picture&gt;</code> element is used for?", options: ["Photo gallery", "Art direction — serving different images per breakpoint", "Canvas fallback", "Background images"], answer: 1 },
      { q: "What is a landmark region in HTML?", options: ["Geographic data", "Semantic element that helps AT users navigate", "An ARIA-only attribute", "A CSS selector"], answer: 1 },
      { q: "<code>&lt;noscript&gt;</code> content is shown when?", options: ["JS is loading", "JS is disabled", "Page has errors", "CSS is missing"], answer: 1 },
      { q: "Which HTTP method is default for HTML forms?", options: ["post", "put", "get", "patch"], answer: 2 },
      { q: 'What does <code>enctype="multipart/form-data"</code> enable?', options: ["JSON submission", "File uploads", "Multiple forms", "Encrypted POST"], answer: 1 },
      { q: '<code>rel="noopener noreferrer"</code> on links prevents?', options: ["CORS errors", "Tab theft via window.opener and referrer leaks", "XSS", "Caching"], answer: 1 },
      { q: "The <code>&lt;output&gt;</code> element is for?", options: ["Error messages", "Result of a calculation or user action", "Script output", "Form labels"], answer: 1 },
      { q: "Which element prevents content from being parsed as HTML?", options: ["&lt;raw&gt;", "&lt;escaped&gt;", "&lt;pre&gt;&lt;code&gt;", "&lt;plaintext&gt;"], answer: 2 },
      { q: "<code>aria-expanded</code> is used on?", options: ["Images", "Toggleable controls like accordions", "All form inputs", "Table headers"], answer: 1 }
